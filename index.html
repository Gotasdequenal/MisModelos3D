<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050811; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar-left { width: 180px; background: rgba(30, 41, 59, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; border-right: 1px solid #334155; }
        .upload-btn { background: #1e293b; border: 2px dashed #00d1ff; padding: 15px; border-radius: 12px; cursor: pointer; color: #00d1ff; font-size: 10px; font-weight: bold; text-align: center; width: 100px; }
        .btn-delete { position: relative; padding: 10px 20px; background: #fec195; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; }
        .star { position: absolute; width: 10px; opacity: 0; transition: 0.5s; }
        .btn-delete:hover .star { opacity: 1; }
        
        #sidebar-right { width: 100px; background: rgba(30, 41, 59, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #334155; }
        .vertical-slider { appearance: slider-vertical; width: 6px; height: 300px; }
        
        #container3d { flex-grow: 1; position: relative; }
        
        /* Botones Subir/Bajar sin texto extra */
        .controls-y { position: absolute; top: 100px; right: 130px; display: flex; flex-direction: column; gap: 20px; }
        .btn-y { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }

        /* Botón QR Galáctico */
        .btn { display: flex; justify-content: center; align-items: center; width: 13rem; overflow: hidden; height: 3rem; cursor: pointer; border-radius: 5rem; animation: gradient_301 5s ease infinite; border: double 4px transparent; background-image: linear-gradient(#212121, #212121), linear-gradient(137.48deg, #ffdb3b 10%, #fe53bb 45%, #8f51ea 67%, #0044ff 87%); background-origin: border-box; background-clip: content-box, border-box; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .btn strong { z-index: 2; font-size: 12px; letter-spacing: 2px; color: white; }
        
        #presentation { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: black; }
    </style>
</head>
<body>
    <div id="sidebar-left">
        <div class="upload-btn" onclick="document.getElementById('fileInput').click()">SUBIR ARCHIVO</div>
        <input type="file" id="fileInput" hidden accept=".glb">
        <button class="btn-delete" id="deleteBtn">ELIMINAR<svg class="star" style="top:-20px; left:-10px" viewBox="0 0 24 24"><path fill="#fff" d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg></button>
    </div>

    <div class="controls-y">
        <button class="btn-y" style="background:#00d1ff" id="btnUp">SUBIR</button>
        <button class="btn-y" style="background:#9d50bb" id="btnDown">BAJAR</button>
    </div>

    <div id="container3d"></div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; font-size: 10px; margin-bottom:10px; color:#00d1ff">ESCALAR</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
    </div>

    <button class="btn" id="generateBtn"><strong>GENERAR QR</strong></button>

    <div id="presentation">
        <button id="closeBtn">← VOLVER</button>
        <div id="qrcode"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        let scene, camera, renderer, robot;
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container3d').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        scene.add(new THREE.GridHelper(10, 10), new THREE.AxesHelper(5));

        document.getElementById('fileInput').onchange = (e) => {
            new GLTFLoader().load(URL.createObjectURL(e.target.files[0]), (g) => { robot = g.scene; scene.add(robot); });
        };
        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.2; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.2; };
        document.getElementById('generateBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            const data = await (await fetch(`https://api.cloudinary.com/v1_1/dudse9ysg/auto/upload`, { method: 'POST', body: new FormData().append('file', file) || new FormData().append('upload_preset', "Clase_3d") })).json();
            const url = `${window.location.origin}${window.location.pathname.replace('index.html','')}view.html?model=${encodeURIComponent(data.secure_url)}`;
            document.getElementById('qrcode').innerHTML = ""; new QRCode(document.getElementById("qrcode"), { text: url, width: 250, height: 250 });
            document.getElementById('presentation').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation').style.display = 'none';
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();
    </script>
</body>
</html>
