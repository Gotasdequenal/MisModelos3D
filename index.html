<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de modelo 3D con realidad aumentada</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f1a; color: white; display: flex; height: 100vh; overflow: hidden; cursor: none; }
        
        /* TÍTULO */
        #header-title { position: absolute; top: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200; border-bottom: 1px solid #334155; }
        #header-title h1 { margin: 0; font-size: 1.1rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 3px; }

        /* CURSOR PERSONALIZADO */
        #custom-cursor { position: fixed; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: center; transition: transform 0.1s ease; }
        #cursor-icon { width: 30px; height: 40px; border: 2px solid white; border-radius: 15px; position: relative; background: rgba(0,0,0,0.5); }
        #cursor-icon::before { content: ''; position: absolute; top: 5px; left: 50%; width: 2px; height: 10px; background: white; transform: translateX(-100%); } /* Rueda */
        .cursor-btn { position: absolute; top: 0; width: 50%; height: 40%; border-radius: 10px 10px 0 0; opacity: 0; }
        .btn-left { left: 0; background: #38bdf8; }
        .btn-right { right: 0; background: #f59aff; }
        #cursor-label { margin-top: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; display: none; white-space: nowrap; }

        /* SIDEBAR IZQUIERDA */
        #sidebar-left { width: 150px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 80px; z-index: 100; pointer-events: auto; }
        .stacked-btn { transform: rotate(-25deg) skew(25deg); transform-style: preserve-3d; position: relative; width: 80px; height: 32px; border: none; background: transparent; cursor: pointer; }
        .stacked-btn span { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2a2a2a; color: #fff; font-size: 18px; transition: 0.5s ease-out; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stacked-btn:hover span:nth-child(5) { opacity: 1; }
        
        /* Animación Subir (Hacia arriba) */
        #btnUp:hover span:nth-child(5) { transform: translate(30px, -30px); background: #52E19F; }
        #btnUp:hover span:nth-child(4) { transform: translate(24px, -24px); opacity: .8; }
        #btnUp:hover span:nth-child(3) { transform: translate(18px, -18px); opacity: .6; }
        #btnUp:hover span:nth-child(2) { transform: translate(12px, -12px); opacity: .4; }
        
        /* Animación Bajar (Hacia abajo) */
        #btnDown:hover span:nth-child(5) { transform: translate(-30px, 30px); background: #ef4444; }
        #btnDown:hover span:nth-child(4) { transform: translate(-24px, 24px); opacity: .8; }
        #btnDown:hover span:nth-child(3) { transform: translate(-18px, 18px); opacity: .6; }
        #btnDown:hover span:nth-child(2) { transform: translate(-12px, 12px); opacity: .4; }

        /* SIDEBAR DERECHA */
        #sidebar-right { width: 100px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .vertical-slider { appearance: slider-vertical; width: 8px; height: 300px; background: #475569; outline: none; }

        /* BOTÓN GENERAR QR */
        .Btn-Container { display: flex; width: 220px; height: 55px; background-color: #1d2129; border-radius: 40px; box-shadow: 0px 5px 15px rgba(0,0,0,0.5); justify-content: space-between; align-items: center; border: none; cursor: pointer; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .icon-Container { width: 45px; height: 45px; background-color: #38bdf8; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid #1d2129; margin-left: 5px; }
        .text { width: calc(220px - 60px); color: white; font-weight: bold; font-size: 0.8em; letter-spacing: 1px; }

        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 2000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; }
    </style>
</head>
<body>

    <!-- HUD DEL CURSOR -->
    <div id="custom-cursor">
        <div id="cursor-icon">
            <div class="cursor-btn btn-left" id="m-left"></div>
            <div class="cursor-btn btn-right" id="m-right"></div>
        </div>
        <div id="cursor-label"></div>
    </div>

    <div id="header-title">
        <h1>Visualizador de modelo 3D con realidad aumentada</h1>
    </div>

    <div id="sidebar-left">
        <p style="color:#52E19F; font-weight:bold; font-size:12px;">SUBIR</p>
        <button class="stacked-btn" id="btnUp"><span>▲</span><span>▲</span><span>▲</span><span>▲</span><span>▲</span></button>
        <button class="stacked-btn" id="btnDown"><span>▼</span><span>▼</span><span>▼</span><span>▼</span><span>▼</span></button>
        <p style="color:#ef4444; font-weight:bold; font-size:12px;">BAJAR</p>
    </div>

    <div id="container3d" style="flex-grow: 1;"></div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; margin-bottom: 15px; font-size: 12px; color: #38bdf8; font-weight: bold;">ESCALAR DISEÑO</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
        <div id="scale-val" style="margin-top:10px; font-weight:bold; color:#38bdf8;">1.0x</div>
    </div>

    <button class="Btn-Container" id="generateBtn">
        <span class="text">GENERAR CÓDIGO QR</span>
        <span class="icon-Container">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="none"><path d="M8 1L15 9L8 17M15 9H1" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
    </button>

    <div id="presentation-view">
        <button id="closeBtn" style="position:absolute; top:30px; left:30px; padding:12px 25px; border-radius:50px; cursor:pointer;">← VOLVER</button>
        <div style="text-align:center"><h3>1. ESCANEA EL QR</h3><div id="qrcode"></div></div>
        <div style="text-align:center"><h3>2. APUNTA AL MARCADOR</h3><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" style="border:40px solid black; width:280px;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, robot, markerPlane;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false, isRotating = false;

        const cursor = document.getElementById('custom-cursor');
        const cLabel = document.getElementById('cursor-label');
        const cLeft = document.getElementById('m-left');
        const cRight = document.getElementById('m-right');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(4, 3, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            // EJES Y GRILLA
            scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x222222));
            scene.add(new THREE.AxesHelper(5));

            // MARCADOR BASE
            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (t) => {
                markerPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5), new THREE.MeshBasicMaterial({ map: t }));
                markerPlane.rotation.x = -Math.PI / 2;
                scene.add(markerPlane);
            });

            new GLTFLoader().load('modelo1.glb', (g) => { robot = g.scene; scene.add(robot); });

            controls = new OrbitControls(camera, renderer.domElement);
            
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onMouseMove(e) {
            // Posición del Cursor HUD
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            mouse.x = ((e.clientX - 150) / (window.innerWidth - 250)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Lógica de Cursor sobre el Robot
            if(robot) {
                const hits = raycaster.intersectObject(robot, true);
                if(hits.length > 0) {
                    cLabel.style.display = 'block';
                    cLabel.style.background = '#38bdf8';
                    cLabel.innerText = "Click Izq: Rotar | Der: Mover";
                    cLeft.style.opacity = "1"; cRight.style.opacity = "1";
                } else {
                    cLabel.style.display = 'none';
                    cLeft.style.opacity = "0"; cRight.style.opacity = "0";
                }

                // Lógica de arrastre inteligente (orientado a cámara)
                if(isDragging) {
                    const planeTarget = new THREE.Plane(new THREE.Vector3(0, 1, 0), -robot.position.y);
                    const intersectPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(planeTarget, intersectPoint);
                    robot.position.x = intersectPoint.x;
                    robot.position.z = intersectPoint.z;
                }
                if(isRotating) {
                    robot.rotation.y += e.movementX * 0.01;
                    robot.rotation.x += e.movementY * 0.01;
                }
            }
        }

        function onMouseDown(e) {
            if(robot) {
                const hits = raycaster.intersectObject(robot, true);
                if(hits.length > 0) {
                    controls.enabled = false;
                    if(e.button === 0) { isRotating = true; cursor.style.transform = "scale(1.2) rotate(15deg)"; }
                    if(e.button === 2) { isDragging = true; cursor.style.transform = "scale(1.2)"; }
                }
            }
            // Si hace click en el fondo para cámara
            if(e.button === 2 && !isDragging) cursor.style.filter = "hue-rotate(90deg)"; 
        }

        function onMouseUp() {
            controls.enabled = true; isDragging = isRotating = false;
            cursor.style.transform = "scale(1) rotate(0deg)";
            cursor.style.filter = "none";
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        function onWindowResize() {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        }

        // ACCIONES UI
        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.1; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.1; };
        document.getElementById('scaleInput').oninput = function() {
            if(robot) { robot.scale.set(this.value, this.value, this.value); document.getElementById('scale-val').innerText = this.value + "x"; }
        };

        document.getElementById('generateBtn').onclick = () => {
            const s = document.getElementById('scaleInput').value;
            const p = robot.position, r = robot.rotation;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let finalUrl = `${baseUrl}ar.html?s=${s}&px=${p.x.toFixed(2)}&py=${p.y.toFixed(2)}&pz=${p.z.toFixed(2)}&rx=${THREE.MathUtils.radToDeg(r.x).toFixed(0)}&ry=${THREE.MathUtils.radToDeg(r.y).toFixed(0)}&rz=${THREE.MathUtils.radToDeg(r.z).toFixed(0)}`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
            document.getElementById('presentation-view').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation-view').style.display = 'none';
    </script>
</body>
</html>
