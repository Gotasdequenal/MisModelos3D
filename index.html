<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor 3D</title>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: #050811; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar-left { width: 180px; background: #1e293b; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #container3d { flex-grow: 1; position: relative; }
        .btn-gen { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #8f51ea; color: white; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
        #presentation { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: black; }
    </style>
</head>
<body>
    <div id="sidebar-left">
        <div onclick="document.getElementById('fileInput').click()" style="border: 2px dashed #00d1ff; padding: 15px; cursor: pointer;">SUBIR ARCHIVO</div>
        <input type="file" id="fileInput" hidden accept=".glb">
    </div>
    <div id="container3d"></div>
    <button class="btn-gen" id="generateBtn">GENERAR CÓDIGO QR</button>
    <div id="presentation"><button id="closeBtn">CERRAR</button><div id="qrcode"></div></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        let scene = new THREE.Scene(), robot;
        let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container3d').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5), new THREE.GridHelper(10, 10), new THREE.AxesHelper(5));
        
        document.getElementById('fileInput').onchange = (e) => {
            new GLTFLoader().load(URL.createObjectURL(e.target.files[0]), (g) => { 
                if(robot) scene.remove(robot);
                robot = g.scene; scene.add(robot); 
            });
        };
        document.getElementById('generateBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', "Clase_3d");
            const res = await fetch(`https://api.cloudinary.com/v1_1/dudse9ysg/auto/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            const url = `${window.location.origin}${window.location.pathname.replace('index.html','')}view.html?model=${encodeURIComponent(data.secure_url)}`;
            document.getElementById('qrcode').innerHTML = ""; new QRCode(document.getElementById("qrcode"), { text: url, width: 250, height: 250 });
            document.getElementById('presentation').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation').style.display = 'none';
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();
    </script>
</body>
</html>
