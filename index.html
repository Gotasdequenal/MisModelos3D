<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SALA AR - PANEL DOCENTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .marcador { width: 200px; border: 20px solid black; margin-top: 20px; }
        h1 { color: #38bdf8; }
    </style>
</head>
<body>
    <h1>SALA DE DISEÑO 3D</h1>
    <div class="card">
        <p style="color: black; font-weight: bold;">1. ESCANEA PARA EMPEZAR</p>
        <div id="qrcode"></div>
    </div>
    <p>2. LUEGO APUNTA A ESTE MARCADOR:</p>
    <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="marcador">

    <script>
        // Generamos el QR que apunta al SEGUNDO archivo (ar.html)
        const currentPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const arUrl = window.location.origin + currentPath + "ar.html";
        new QRCode(document.getElementById("qrcode"), {
            text: arUrl,
            width: 250,
            height: 250
        });
    </script>
</body>
</html>
