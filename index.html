<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación AR Profesional</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #pc-view { text-align: center; }
        .qr-card { background: white; padding: 20px; border-radius: 20px; }
        #mobile-view { display: none; width: 100vw; height: 100vh; }
        model-viewer { width: 100%; height: 100%; }
        
        /* Barra de carga para saber que está pasando */
        #progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); position: absolute; top: 0; }
        #update-bar { width: 0%; height: 100%; background: #38bdf8; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="pc-view">
        <h1>SALA AR: ESCANEA AQUÍ</h1>
        <div class="qr-card"><div id="qrcode"></div></div>
        <p>Asegúrate de que el archivo en GitHub sea <b>modelo1.glb</b></p>
    </div>

    <div id="mobile-view">
        <div id="progress-bar"><div id="update-bar"></div></div>
        <model-viewer id="viewer" src="modelo1.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
            <button slot="ar-button" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #38bdf8; border: none; border-radius: 50px; font-weight: bold;">
                ✨ VER EN MI ESPACIO
            </button>
        </model-viewer>
    </div>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const urlParams = new URLSearchParams(window.location.search);

        if (isMobile || urlParams.get('mode') === 'ar') {
            document.getElementById('pc-view').style.display = 'none';
            document.getElementById('mobile-view').style.display = 'block';
            
            // Lógica de la barra de carga
            const modelViewer = document.querySelector('#viewer');
            const updateBar = document.querySelector('#update-bar');
            modelViewer.addEventListener('progress', (event) => {
                updateBar.style.width = `${event.detail.totalProgress * 100}%`;
                if (event.detail.totalProgress === 1) {
                   document.querySelector('#progress-bar').style.display = 'none';
                }
            });
        } else {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href + "?mode=ar",
                width: 250, height: 250
            });
        }
    </script>
</body>
</html>
