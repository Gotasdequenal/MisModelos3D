<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editor 3D Pro - Gotasdequenal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Gizmos de movimiento -->
    <script src="https://unpkg.com/aframe-transform-controls-component@0.3.0/dist/aframe-transform-controls-component.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #1e293b; padding: 20px; border-right: 2px solid #334155; display: flex; flex-direction: column; gap: 15px; z-index: 100; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .control-group { background: #334155; padding: 15px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.7rem; color: #38bdf8; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        .btn-ar { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be); color: white; font-weight: bold; align-self: center; margin-top: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        #preview-zone { flex-grow: 1; position: relative; background: #111; }
        
        /* Pantalla Hiro Gigante */
        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .hiro-container { border: 60px solid black; padding: 40px; background: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: #38bdf8; text-align: center; margin: 0;">ESTACIÓN 3D</h2>
        
        <div class="control-group">
            <label>ESCALA (Tamaño): <span id="scale-val">1.0</span>x</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>ROTACIÓN (X, Y, Z)</label>
            <input type="range" id="rotX" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotY" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotZ" min="-180" max="180" value="0" oninput="actualizar()">
        </div>

        <p style="font-size: 10px; color: #94a3b8;">* Usa las flechas de colores para mover el robot en el espacio.</p>

        <button class="btn-ar" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
            
            <a-sky color="#111"></a-sky>
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; intensity: 0.8; position: 1 3 2"></a-entity>

            <!-- Rejilla de Diseño -->
            <a-entity gridhelper="size: 10; divisions: 20; colorCenterLine: #38bdf8; colorGrid: #444" position="0 -0.01 0"></a-entity>

            <!-- Marcador Hiro en el centro -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="1.5" height="1.5" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg"></a-plane>

            <!-- EL ROBOT CON GIZMOS (FLECHITAS) -->
            <a-entity id="gizmo-container" transform-controls="mode: translate; size: 0.6">
                <a-entity id="robot" gltf-model="#modelo" position="0 0 0"></a-entity>
            </a-entity>

            <!-- Cámara: Orbitar con mouse -->
            <a-entity position="0 1.5 3">
                <a-camera look-controls wasd-controls="enabled: false"></a-camera>
            </a-entity>
        </a-scene>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding: 10px; border-radius: 5px; cursor: pointer;">Cerrar</button>
        <div class="hiro-container">
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="280">
        </div>
        <div id="qrcode"></div>
        <p style="margin-top: 15px; font-weight: bold; font-family: sans-serif;">ESCANEAME Y APUNTA AL HIRO DE ARRIBA</p>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });
        const robot = document.getElementById('robot');
        const gizmo = document.getElementById('gizmo-container');

        function actualizar() {
            const s = document.getElementById('scale').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;
            robot.setAttribute('scale', `${s} ${s} ${s}`);
            robot.setAttribute('rotation', `${rx} ${ry} ${rz}`);
        }

        function mostrarPresentacion() {
            const pos = gizmo.getAttribute('position');
            const s = document.getElementById('scale').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;

            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            let finalUrl = `${baseUrl}ar.html?s=${s}&rx=${rx}&ry=${ry}&rz=${rz}&px=${pos.x.toFixed(2)}&py=${pos.y.toFixed(2)}&pz=${pos.z.toFixed(2)}`;
            
            qr.clear();
            qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }
        window.onload = actualizar;
    </script>
</body>
</html>
