<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editor AR Profesional - Gotasdequenal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Librería para las flechas de movimiento (Gizmos) -->
    <script src="https://unpkg.com/aframe-transform-controls-component@0.3.0/dist/aframe-transform-controls-component.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { 
            width: 320px; background: #1e293b; padding: 20px; 
            border-right: 2px solid #334155; display: flex; 
            flex-direction: column; gap: 15px; z-index: 100;
        }
        .control-group { background: #334155; padding: 15px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.7rem; color: #38bdf8; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        .btn-ar {
            width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); color: white; font-weight: bold;
            align-self: center; margin-top: auto;
        }

        #preview-zone { flex-grow: 1; position: relative; background: #000; }
        
        /* Pantalla de Escaneo */
        #presentation-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; color: black; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .hiro-frame { border: 50px solid black; padding: 40px; background: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: #38bdf8; text-align: center; margin: 0;">EDITOR 3D PRO</h2>
        <p style="font-size: 0.65rem; color: #94a3b8; text-align: center;">USA LAS FLECHAS PARA MOVER EL ROBOT</p>
        
        <div class="control-group">
            <label>ESCALA (Tamaño): <span id="scale-val">1.0</span>x</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>ROTACIÓN (X, Y, Z)</label>
            <input type="range" id="rotX" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotY" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotZ" min="-180" max="180" value="0" oninput="actualizar()">
        </div>

        <button class="btn-ar" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
            
            <a-sky color="#0f172a"></a-sky>
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; intensity: 0.8; position: 1 3 2"></a-entity>

            <!-- Piso HIRO con Rejilla 3D -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="2" height="2" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg"></a-plane>
            <a-grid position="0 -0.01 0" rotation="-90 0 0" width="10" height="10" color="#334155"></a-grid>

            <!-- EL ROBOT CON GIZMOS (FLECHITAS) -->
            <!-- Puedes moverlo arrastrando las flechas directamente -->
            <a-entity id="robot-container" transform-controls="mode: translate">
                <a-entity id="robot" gltf-model="#modelo" position="0 0 0" scale="1 1 1"></a-entity>
            </a-entity>

            <!-- Cámara: Clic izquierdo para rotar la vista -->
            <a-entity id="cameraRig" position="0 1.5 3">
                <a-camera look-controls wasd-controls="enabled: false"></a-camera>
            </a-entity>
        </a-scene>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding: 10px; cursor:pointer;">← VOLVER</button>
        <div class="hiro-frame">
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="250">
        </div>
        <div id="qrcode"></div>
        <p style="margin-top: 10px; font-weight: bold;">ESCANEA Y APUNTA AL MARCADOR HIRO</p>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });
        const robot = document.getElementById('robot');
        const container = document.getElementById('robot-container');

        function actualizar() {
            const s = document.getElementById('scale').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;
            robot.setAttribute('scale', `${s} ${s} ${s}`);
            robot.setAttribute('rotation', `${rx} ${ry} ${rz}`);
        }

        function mostrarPresentacion() {
            // Obtener posición actual del robot (movido por las flechas)
            const pos = container.getAttribute('position');
            const s = document.getElementById('scale').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;

            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            // Generamos el link con los datos exactos del Gizmo
            let finalUrl = `${baseUrl}ar.html?s=${s}&rx=${rx}&ry=${ry}&rz=${rz}&px=${pos.x.toFixed(2)}&py=${pos.y.toFixed(2)}&pz=${pos.z.toFixed(2)}`;
            
            qr.clear();
            qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }
        
        window.onload = actualizar;
    </script>
</body>
</html>
