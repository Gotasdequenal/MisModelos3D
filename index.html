<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor AR Pro v10 - Gotasdequenal</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 340px; background: #1e293b; padding: 15px; border-right: 2px solid #334155; display: flex; flex-direction: column; gap: 8px; z-index: 100; overflow-y: auto; }
        .control-group { background: #334155; padding: 10px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.65rem; color: #38bdf8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        
        input[type="range"] { width: 100%; cursor: pointer; height: 6px; border-radius: 5px; appearance: none; background: #475569; outline: none; margin-bottom: 8px; }
        .range-x::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; }
        .range-y::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #22c55e; border-radius: 50%; }
        .range-z::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; }
        
        .btn-ar-orbe { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be); color: white; font-weight: bold; align-self: center; margin-top: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* PREVIEW ZONE */
        #preview-zone { flex-grow: 1; position: relative; background: radial-gradient(circle, #233142 0%, #0f172a 100%); }
        
        /* EL ROBOT (Alta fidelidad) */
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; z-index: 10; }

        /* ESCENARIO DE REFERENCIA (EJES Y GRILLA) */
        #stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; perspective: 1000px; }
        #floor { 
            width: 600px; height: 600px; 
            background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 30px 30px; transform: rotateX(75deg) translateY(120px);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .axis { position: absolute; }
        #axis-x { width: 1000px; height: 2px; background: #ef4444; } /* Rojo */
        #axis-z { width: 2px; height: 1000px; background: #3b82f6; } /* Azul */
        #axis-y { width: 2px; height: 400px; background: #22c55e; transform: rotateX(-90deg) translateZ(200px); position: absolute; } /* Verde - Vertical */
        
        #hiro-ref { width: 120px; height: 120px; border: 12px solid black; background: white; display: flex; align-items: center; justify-content: center; z-index: 1; }
        #hiro-ref div { width: 60px; height: 60px; background: black; }

        /* PRESENTACIÓN */
        #presentation-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; color: black; z-index: 1000;
            flex-direction: row; align-items: center; justify-content: space-around; padding: 20px;
        }
        .hiro-img { border: 40px solid black; width: 300px; height: 300px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: #38bdf8; text-align: center; margin: 0; font-size: 1rem;">ESTACIÓN 3D PRO</h2>
        
        <div class="control-group">
            <label>ESCALA: <span id="scale-val">1</span>X</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>POSICIÓN</label>
            <label style="color:#ef4444; font-size:8px">HORIZONTAL (X)</label>
            <input type="range" id="posX" class="range-x" min="-4" max="4" step="0.1" value="0" oninput="actualizar()">
            <label style="color:#22c55e; font-size:8px">ALTURA (Y)</label>
            <input type="range" id="posY" class="range-y" min="-2" max="4" step="0.1" value="0" oninput="actualizar()">
            <label style="color:#3b82f6; font-size:8px">PROFUNDIDAD (Z)</label>
            <input type="range" id="posZ" class="range-z" min="-4" max="4" step="0.1" value="0" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>ROTACIÓN</label>
            <label style="color:#ef4444; font-size:8px">ROTAR X</label>
            <input type="range" id="rotX" class="range-x" min="-180" max="180" value="0" oninput="actualizar()">
            <label style="color:#22c55e; font-size:8px">ROTAR Y</label>
            <input type="range" id="rotY" class="range-y" min="-180" max="180" value="0" oninput="actualizar()">
            <label style="color:#3b82f6; font-size:8px">ROTAR Z</label>
            <input type="range" id="rotZ" class="range-z" min="-180" max="180" value="0" oninput="actualizar()">
        </div>

        <button class="btn-ar-orbe" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <!-- Escenario visual de fondo -->
        <div id="stage">
            <div id="floor">
                <div id="axis-x" class="axis"></div>
                <div id="axis-z" class="axis"></div>
                <div id="axis-y"></div>
                <div id="hiro-ref"><div></div></div>
            </div>
        </div>

        <model-viewer 
            id="visor" 
            src="modelo1.glb" 
            camera-controls 
            environment-image="neutral" 
            shadow-intensity="1"
            exposure="1.2">
        </model-viewer>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding:10px; cursor:pointer;">Cerrar</button>
        <div style="text-align:center">
            <h3>1. ESCANEA ESTE QR</h3>
            <div id="qrcode"></div>
            <p style="margin-top:15px; font-size:0.9rem; color:#666;">Para ver el modelo en Realidad Aumentada</p>
        </div>
        <div style="text-align:center">
            <h3>2. APUNTA AQUÍ</h3>
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-img">
        </div>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 350, height: 350 });
        const visor = document.getElementById('visor');

        function actualizar() {
            const s = document.getElementById('scale').value;
            const px = document.getElementById('posX').value;
            const py = document.getElementById('posY').value;
            const pz = document.getElementById('posZ').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;
            
            // Efecto visual en la PC
            visor.scale = `${s} ${s} ${s}`;
            visor.orientation = `${rx}deg ${ry}deg ${rz}deg`;
            // Mover el contenedor para simular posición 3D
            visor.style.transform = `translate(${px * 50}px, ${-py * 50}px)`;
        }

        function mostrarPresentacion() {
            const val = (id) => document.getElementById(id).value;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            // Pasamos los parámetros al link del QR
            let finalUrl = `${baseUrl}ar.html?s=${val('scale')}&px=${val('posX')}&py=${val('posY')}&pz=${val('posZ')}&rx=${val('rotX')}&ry=${val('rotY')}&rz=${val('rotZ')}`;
            qr.clear(); qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }
        window.onload = actualizar;
    </script>
</body>
</html>
