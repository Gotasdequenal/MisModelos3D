<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #050811; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #header-title { position: absolute; top: 0; width: 100%; text-align: center; padding: 20px; background: rgba(5, 8, 17, 0.8); backdrop-filter: blur(15px); z-index: 200; border-bottom: 1px solid rgba(56, 189, 248, 0.2); }
        #header-title h1 { margin: 0; font-size: 1rem; color: #00d1ff; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0, 209, 255, 0.5); }

        /* CURSOR HUD */
        #custom-cursor { position: fixed; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.2s ease; }
        #cursor-icon { width: 28px; height: 38px; border: 2px solid white; border-radius: 12px; position: relative; background: rgba(0,0,0,0.8); }
        .cursor-btn { position: absolute; top: 0; width: 50%; height: 40%; border-radius: 10px 10px 0 0; }
        .btn-left { left: 0; background: #f59aff; } .btn-right { right: 0; background: #00d1ff; } 
        .cursor-labels { margin-top: 10px; display: flex; gap: 12px; font-size: 10px; font-weight: bold; background: rgba(0, 0, 0, 0.8); padding: 5px 12px; border-radius: 8px; }

        /* SIDEBAR IZQUIERDA (SOLO COLOR) */
        #sidebar-left { width: 150px; background: rgba(20, 30, 50, 0.6); border-right: 1px solid rgba(255,255,255,0.1); z-index: 100; }

        /* CONTROLES ALTURA (ESQUINA SUPERIOR DERECHA) */
        #height-controls { position: absolute; top: 90px; right: 130px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        
        .pushable { position: relative; border: none; background: transparent; padding: 0; cursor: pointer; }
        .shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; background: rgba(0,0,0,0.5); transform: translateY(2px); transition: transform 600ms cubic-bezier(.3, .7, .4, 1); }
        .edge { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; }
        .front { display: block; position: relative; padding: 12px 25px; border-radius: 12px; font-size: 0.8rem; color: white; will-change: transform; transform: translateY(-4px); transition: transform 600ms cubic-bezier(.3, .7, .4, 1); font-weight: bold; letter-spacing: 1px; }
        
        .edge-up { background: #004e64; } .front-up { background: #00d1ff; }
        .edge-down { background: #4a0072; } .front-down { background: #9d50bb; }
        .pushable:hover .front { transform: translateY(-6px); }
        .pushable:active .front { transform: translateY(-2px); }

        /* SIDEBAR DERECHA */
        #sidebar-right { width: 100px; background: rgba(30, 41, 59, 0.4); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .vertical-slider { appearance: slider-vertical; width: 6px; height: 300px; background: #334155; outline: none; border-radius: 10px; cursor: pointer; }

        /* NUEVO BOTÓN QR GALÁCTICO */
        .btn-space {
            display: flex; justify-content: center; align-items: center; width: 18rem; height: 3.5rem; background-size: 300% 300%; backdrop-filter: blur(1rem); border-radius: 5rem; transition: 0.5s; animation: gradient_301 5s ease infinite; border: double 4px transparent;
            background-image: linear-gradient(#212121, #212121), linear-gradient(137.48deg, #ffdb3b 10%, #fe53bb 45%, #8f51ea 67%, #0044ff 87%);
            background-origin: border-box; background-clip: content-box, border-box;
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; cursor: pointer;
        }
        #container-stars { position: absolute; z-index: -1; width: 100%; height: 100%; overflow: hidden; transition: 0.5s; backdrop-filter: blur(1rem); border-radius: 5rem; }
        #stars { position: relative; background: transparent; width: 200rem; height: 200rem; }
        #stars::after { content: ""; position: absolute; top: -10rem; left: -100rem; width: 100%; height: 100%; animation: animStarRotate 90s linear infinite; background-image: radial-gradient(#ffffff 1px, transparent 1%); background-size: 50px 50px; }
        @keyframes animStarRotate { from { transform: rotate(360deg); } to { transform: rotate(0); } }
        @keyframes gradient_301 { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-space:hover { transform: translateX(-50%) scale(1.1); }

        #container3d { flex-grow: 1; position: relative; }
        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 2000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <div id="cursor-icon"><div id="c-left" class="cursor-btn btn-left"></div><div id="c-right" class="cursor-btn btn-right"></div></div>
        <div class="cursor-labels"><span style="color:#f59aff">ROTAR</span><span style="color:#00d1ff">MOVER</span></div>
    </div>

    <div id="header-title"><h1>Visualizador de modelo 3D con realidad aumentada</h1></div>

    <div id="sidebar-left"></div>

    <div id="height-controls">
        <button class="pushable" id="btnUp"><span class="shadow"></span><span class="edge edge-up"></span><span class="front front-up">SUBIR</span></button>
        <button class="pushable" id="btnDown"><span class="shadow"></span><span class="edge edge-down"></span><span class="front front-down">BAJAR</span></button>
    </div>

    <div id="container3d"></div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; margin-bottom: 15px; font-size: 11px; color: #00d1ff; font-weight: bold; letter-spacing: 2px;">ESCALAR DISEÑO</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
        <div id="scale-val" style="margin-top:10px; font-weight:bold; color:#00d1ff;">1.0x</div>
    </div>

    <button class="btn-space" id="generateBtn">
        <div id="container-stars"><div id="stars"></div></div>
        <strong style="color:white; font-size:10px; letter-spacing:3px; z-index:2;">GENERAR CÓDIGO QR</strong>
    </button>

    <div id="presentation-view">
        <button id="closeBtn" style="position:absolute; top:30px; left:30px; padding:12px 25px; border-radius:50px; cursor:pointer; font-weight:bold; border: 1px solid #ccc; background: white;">← VOLVER</button>
        <div style="text-align:center"><h3>1. ESCANEA EL QR</h3><div id="qrcode"></div></div>
        <div style="text-align:center"><h3>2. APUNTA AL MARCADOR</h3><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" style="border:40px solid black; width:280px;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, robot;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false, isRotating = false;
        const hud = document.getElementById('custom-cursor');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050811);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5); sun.position.set(5, 15, 10); scene.add(sun);
            scene.add(new THREE.GridHelper(15, 30, 0x1e293b, 0x0f172a));

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (t) => {
                const marker = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ map: t }));
                marker.rotation.x = -Math.PI / 2;
                scene.add(marker);
            });

            new GLTFLoader().load('modelo1.glb', (g) => { robot = g.scene; scene.add(robot); });

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

            window.addEventListener('mousemove', (e) => {
                hud.style.left = (e.clientX + 10) + 'px'; hud.style.top = (e.clientY + 10) + 'px';
                mouse.x = ((e.clientX - 150) / (window.innerWidth - 250)) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                if(robot) {
                    const hits = raycaster.intersectObject(robot, true);
                    if(hits.length > 0) {
                        hud.style.opacity = "1"; document.body.style.cursor = "none";
                        document.getElementById('c-left').style.opacity = "1"; document.getElementById('c-right').style.opacity = "1";
                    } else if(!isDragging && !isRotating) {
                        hud.style.opacity = "0"; document.body.style.cursor = "default";
                    }
                    if(isDragging){
                        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -robot.position.y);
                        const pt = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, pt);
                        robot.position.x = pt.x; robot.position.z = pt.z;
                    }
                    if(isRotating){ robot.rotation.y += e.movementX * 0.01; robot.rotation.x += e.movementY * 0.01; }
                }
            });

            window.addEventListener('mousedown', (e) => {
                const hits = raycaster.intersectObject(robot, true);
                if(hits.length > 0){
                    controls.enabled = false;
                    if(e.button === 0) isRotating = true;
                    if(e.button === 2) isDragging = true;
                }
            });

            window.addEventListener('mouseup', () => { controls.enabled = true; isDragging = isRotating = false; });
            window.addEventListener('resize', () => {
                camera.aspect = (window.innerWidth - 250) / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth - 250, window.innerHeight);
            });
            
            function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
            animate();
        }

        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.2; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.2; };
        document.getElementById('scaleInput').oninput = function() {
            if(robot) { robot.scale.set(this.value, this.value, this.value); document.getElementById('scale-val').innerText = this.value + "x"; }
        };

        document.getElementById('generateBtn').onclick = () => {
            const s = document.getElementById('scaleInput').value;
            const p = robot.position, r = robot.rotation;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let finalUrl = `${baseUrl}ar.html?s=${s}&px=${p.x.toFixed(2)}&py=${p.y.toFixed(2)}&pz=${p.z.toFixed(2)}&rx=${THREE.MathUtils.radToDeg(r.x).toFixed(0)}&ry=${THREE.MathUtils.radToDeg(r.y).toFixed(0)}&rz=${THREE.MathUtils.radToDeg(r.z).toFixed(0)}`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
            document.getElementById('presentation-view').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation-view').style.display = 'none';
    </script>
</body>
</html>
