<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de modelo 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #header-title { position: absolute; top: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200; border-bottom: 1px solid #334155; }
        #header-title h1 { margin: 0; font-size: 1.1rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 3px; }

        /* CURSOR HUD */
        #custom-cursor { position: fixed; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.2s ease; }
        #cursor-icon { width: 25px; height: 35px; border: 2px solid white; border-radius: 12px; position: relative; background: rgba(0,0,0,0.8); }
        .cursor-btn { position: absolute; top: 0; width: 50%; height: 40%; border-radius: 8px 8px 0 0; }
        .btn-left { left: 0; background: #f59aff; }
        .btn-right { right: 0; background: #38bdf8; }
        .cursor-labels { margin-top: 5px; display: flex; gap: 10px; font-size: 10px; font-weight: bold; }

        /* SIDEBAR IZQUIERDA: BOTONES PUSHABLE 3D */
        #sidebar-left { width: 150px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; z-index: 100; }
        
        .pushable { position: relative; border: none; background: transparent; padding: 0; cursor: pointer; outline-offset: 4px; transition: filter 250ms; user-select: none; }
        .shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; background: hsl(0deg 0% 0% / 0.25); transform: translateY(2px); transition: transform 600ms cubic-bezier(.3, .7, .4, 1); }
        .edge { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; }
        .front { display: block; position: relative; padding: 12px 20px; border-radius: 12px; font-size: 1rem; color: white; will-change: transform; transform: translateY(-4px); transition: transform 600ms cubic-bezier(.3, .7, .4, 1); font-weight: bold; }
        
        /* Colores Verdes (Subir) */
        .edge-up { background: linear-gradient(to left, hsl(145deg 100% 16%) 0%, hsl(145deg 100% 32%) 8%, hsl(145deg 100% 32%) 92%, hsl(145deg 100% 16%) 100%); }
        .front-up { background: hsl(145deg 100% 40%); }
        /* Colores Rojos (Bajar) */
        .edge-down { background: linear-gradient(to left, hsl(345deg 100% 16%) 0%, hsl(345deg 100% 32%) 8%, hsl(345deg 100% 32%) 92%, hsl(345deg 100% 16%) 100%); }
        .front-down { background: hsl(345deg 100% 47%); }

        .pushable:hover .front { transform: translateY(-6px); }
        .pushable:active .front { transform: translateY(-2px); }
        .pushable:hover .shadow { transform: translateY(4px); }
        .pushable:active .shadow { transform: translateY(1px); }

        /* SIDEBAR DERECHA */
        #sidebar-right { width: 100px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .vertical-slider { appearance: slider-vertical; width: 8px; height: 300px; background: #475569; outline: none; }

        /* BOTÓN QR: SPARKLE ANIMATED */
        .button-qr {
            --black-700: hsla(0 0% 12% / 1); --border_radius: 9999px; --transtion: 0.3s ease-in-out;
            cursor: pointer; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 2rem; background-color: transparent;
            border: none; border-radius: var(--border_radius); z-index: 1000; transition: transform var(--transtion);
        }
        .button-qr::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background-color: var(--black-700); border-radius: var(--border_radius); box-shadow: inset 0 0.5px hsl(0, 0%, 100%), inset 0 -1px 2px 0 hsl(0, 0%, 0%), 0px 4px 10px -4px hsla(0 0% 0% / 0.5); transition: all var(--transtion); z-index: 0; }
        .button-qr::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background-color: hsla(200 97% 61% / 0.75); background-image: radial-gradient(at 51% 89%, hsla(190, 45%, 74%, 1) 0px, transparent 50%); opacity: var(--active, 0); border-radius: var(--border_radius); transition: opacity var(--transtion); z-index: 2; }
        .button-qr:is(:hover, :focus-visible) { --active: 1; transform: translateX(-50%) scale(1.1); }
        .button-qr .dots_border { overflow: hidden; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: calc(100% + 2px); height: calc(100% + 2px); border-radius: var(--border_radius); z-index: -10; }
        .button-qr .dots_border::before { content: ""; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); transform-origin: left; width: 100%; height: 2rem; background-color: white; mask: linear-gradient(transparent 0%, white 120%); animation: rotate 2s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .button-qr .text_button { position: relative; z-index: 10; font-size: 0.9rem; font-weight: bold; color: white; letter-spacing: 1px; }

        #container3d { flex-grow: 1; position: relative; }
        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 2000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <div id="cursor-icon"><div class="cursor-btn btn-left"></div><div class="cursor-btn btn-right"></div></div>
        <div class="cursor-labels"><span style="color:#f59aff">ROTAR</span><span style="color:#38bdf8">MOVER</span></div>
    </div>

    <div id="header-title"><h1>Visualizador de modelo 3D con realidad aumentada</h1></div>

    <div id="sidebar-left">
        <div class="btn-wrapper">
            <button class="pushable" id="btnUp">
                <span class="shadow"></span><span class="edge edge-up"></span><span class="front front-up">SUBIR</span>
            </button>
        </div>
        <div class="btn-wrapper">
            <button class="pushable" id="btnDown">
                <span class="shadow"></span><span class="edge edge-down"></span><span class="front front-down">BAJAR</span>
            </button>
        </div>
    </div>

    <div id="container3d"></div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; margin-bottom: 15px; font-size: 11px; color: #38bdf8; font-weight: bold;">ESCALAR DISEÑO</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
        <div id="scale-val" style="margin-top:10px; font-weight:bold; color:#38bdf8;">1.0x</div>
    </div>

    <button class="button-qr" id="generateBtn">
        <div class="dots_border"></div>
        <span class="text_button">GENERAR CÓDIGO QR</span>
    </button>

    <div id="presentation-view">
        <button id="closeBtn" style="position:absolute; top:30px; left:30px; padding:12px 25px; border-radius:50px; cursor:pointer;">← VOLVER</button>
        <div style="text-align:center"><h3>1. ESCANEA EL QR</h3><div id="qrcode"></div></div>
        <div style="text-align:center"><h3>2. APUNTA AL MARCADOR</h3><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" style="border:40px solid black; width:280px;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, robot;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false, isRotating = false;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.8));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            scene.add(new THREE.GridHelper(15, 30, 0x444444, 0x222222));
            scene.add(new THREE.AxesHelper(6));

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (t) => {
                const marker = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ map: t }));
                marker.rotation.x = -Math.PI / 2;
                scene.add(marker);
            });

            new GLTFLoader().load('modelo1.glb', (g) => { robot = g.scene; scene.add(robot); });

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', () => { controls.enabled = true; isDragging = isRotating = false; });
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onMouseMove(e) {
            const cursorHUD = document.getElementById('custom-cursor');
            cursorHUD.style.left = (e.clientX + 15) + 'px';
            cursorHUD.style.top = (e.clientY + 15) + 'px';

            mouse.x = ((e.clientX - 150) / (window.innerWidth - 250)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if(robot) {
                const hits = raycaster.intersectObject(robot, true);
                if(hits.length > 0) {
                    cursorHUD.style.opacity = "1";
                    document.body.style.cursor = "none";
                } else if(!isDragging && !isRotating) {
                    cursorHUD.style.opacity = "0";
                    document.body.style.cursor = "default";
                }

                if(isDragging) {
                    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -robot.position.y);
                    const point = new THREE.Vector3();
                    raycaster.ray.intersectPlane(plane, point);
                    robot.position.x = point.x;
                    robot.position.z = point.z;
                }
                if(isRotating) {
                    robot.rotation.y += e.movementX * 0.01;
                    robot.rotation.x += e.movementY * 0.01;
                }
            }
        }

        function onMouseDown(e) {
            const hits = raycaster.intersectObject(robot, true);
            if(hits.length > 0) {
                controls.enabled = false;
                if(e.button === 0) isRotating = true;
                if(e.button === 2) isDragging = true;
            }
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        function onWindowResize() {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        }

        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.2; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.2; };
        document.getElementById('scaleInput').oninput = function() {
            const val = parseFloat(this.value);
            if(robot) robot.scale.set(val, val, val);
            document.getElementById('scale-val').innerText = val.toFixed(1) + "x";
        };

        document.getElementById('generateBtn').onclick = () => {
            // Pequeño retraso para que se vea la animación del botón antes de cambiar
            setTimeout(() => {
                const s = document.getElementById('scaleInput').value;
                const p = robot.position, r = robot.rotation;
                let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
                if (!baseUrl.endsWith('/')) baseUrl += '/';
                let finalUrl = `${baseUrl}ar.html?s=${s}&px=${p.x.toFixed(2)}&py=${p.y.toFixed(2)}&pz=${p.z.toFixed(2)}&rx=${THREE.MathUtils.radToDeg(r.x).toFixed(0)}&ry=${THREE.MathUtils.radToDeg(r.y).toFixed(0)}&rz=${THREE.MathUtils.radToDeg(r.z).toFixed(0)}`;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
                document.getElementById('presentation-view').style.display = 'flex';
            }, 300);
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation-view').style.display = 'none';
    </script>
</body>
</html>
