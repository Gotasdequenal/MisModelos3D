<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor AR - Profesor</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .controls { position: absolute; left: 20px; top: 20px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); z-index: 10; width: 250px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; margin-top: 15px; display: inline-block; }
        model-viewer { width: 100vw; height: 100vh; background: #121212; }
        .instrucciones { font-size: 0.8rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Panel del Docente</h3>
        <input type="text" id="modelName" placeholder="Nombre: mBot2.glb">
        <button onclick="generarTodo()">Generar QR para Alumnos</button>
        <div id="qrcode"></div>
        <p class="instrucciones">1. Escribe el nombre exacto.<br>2. Genera el QR.<br>3. Escanea con el celular.</p>
    </div>

    <model-viewer id="visor" src="mBot2.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
    </model-viewer>

    <script>
        const visor = document.getElementById('visor');
        const qrcodeContainer = document.getElementById("qrcode");
        let qr = new QRCode(qrcodeContainer, { width: 200, height: 200 });

        function generarTodo() {
            const nombre = document.getElementById('modelName').value.trim();
            if(!nombre) return alert("Escribe el nombre del archivo");
            
            // 1. Cambiar el modelo en la pantalla de la PC
            visor.src = nombre;
            
            // 2. Crear el link para el celular
            const urlCelular = window.location.origin + window.location.pathname + "?m=" + nombre;
            
            // 3. Generar el QR con ese link
            qr.clear();
            qr.makeCode(urlCelular);
        }

        // Leer link al cargar (para el celular)
        const params = new URLSearchParams(window.location.search);
        const m = params.get('m');
        if(m) {
            visor.src = m;
            // Si es un celular, ocultar controles para que vea el modelo directo
            if(window.innerWidth < 800) {
                document.querySelector('.controls').style.display = 'none';
            }
        }
    </script>
</body>
</html>
