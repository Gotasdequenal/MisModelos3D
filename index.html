<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: #1a1a1a; padding: 25px; display: flex; flex-direction: column; gap: 25px; border-right: 1px solid #333; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        h3 { margin: 0; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        /* BOTONES Y INPUTS */
        input[type="file"] { font-size: 0.8rem; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d1ff; }
        button { padding: 15px; cursor: pointer; font-weight: bold; background: #00d1ff; border: none; border-radius: 8px; color: #000; transition: 0.3s; }
        button:hover { background: #008fb3; transform: scale(1.02); }

        /* VISOR */
        #container3d { flex-grow: 1; position: relative; background: #000; }
        
        /* PANTALLA DE PRESENTACIÓN (HORIZONTAL) */
        #presentation { 
            display: none; position: fixed; inset: 0; background: white; z-index: 2000; 
            flex-direction: row; align-items: center; justify-content: center; gap: 80px; color: black; 
        }
        .pres-box { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .hiro-img { border: 40px solid black; width: 300px; height: 300px; }
        #closeBtn { position: absolute; top: 20px; left: 20px; background: #eee; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: #333; font-weight: bold; border: 1px solid #ccc; }

        /* VERSION TAG */
        #version { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #444; font-weight: bold; }
    </style>
</head>
<body>
    <div id="version">VERSION 1.1</div>

    <div id="sidebar">
        <div>
            <h3>1. Subir Modelo</h3>
            <p style="font-size: 11px; color: #666;">Selecciona tu archivo .glb</p>
            <input type="file" id="fileInput" accept=".glb">
        </div>
        
        <div>
            <h3>2. Escalar Diseño</h3>
            <input type="range" id="scaleInput" min="0.1" max="10" step="0.1" value="1">
            <p style="text-align: right; font-size: 12px; color: #00d1ff;"><span id="scale-val">1.0</span>x</p>
        </div>
        
        <button id="generateBtn">GENERAR CÓDIGO QR</button>
    </div>

    <div id="container3d"></div>

    <!-- VISTA QR + MARCADOR (AHORA EN HORIZONTAL) -->
    <div id="presentation">
        <div id="closeBtn" onclick="document.getElementById('presentation').style.display='none'">CERRAR</div>
        
        <div class="pres-box">
            <h2 style="margin-bottom: 20px;">1. ESCANEA EL QR</h2>
            <div id="qrcode"></div>
        </div>

        <div class="pres-box">
            <h2 style="margin-bottom: 20px;">2. APUNTA AL MARCADOR</h2>
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-img">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, robot, marker;

        // DATOS CLOUDINARY
        const CLOUD_NAME = "dudse9ysg";
        const UPLOAD_PRESET = "Clase_3d";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 280, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // --- CONFIGURACIÓN PARA MÁXIMO DETALLE ---
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            
            document.getElementById('container3d').appendChild(renderer.domElement);

            // LUCES PROFESIONALES
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
            scene.add(grid);

            // CARGAR BASE HIRO
            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (txt) => {
                const geo = new THREE.PlaneGeometry(2, 2);
                const mat = new THREE.MeshBasicMaterial({ map: txt });
                marker = new THREE.Mesh(geo, mat);
                marker.rotation.x = -Math.PI / 2;
                marker.position.y = 0.005;
                scene.add(marker);
            });

            const loader = new GLTFLoader();
            const controls = new OrbitControls(camera, renderer.domElement);

            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    if(robot) scene.remove(robot);
                    loader.load(URL.createObjectURL(file), (g) => {
                        robot = g.scene;
                        scene.add(robot);
                    });
                }
            };

            document.getElementById('scaleInput').oninput = function() {
                document.getElementById('scale-val').innerText = this.value;
                if(robot) robot.scale.set(this.value, this.value, this.value);
            };

            document.getElementById('generateBtn').onclick = async () => {
                const file = document.getElementById('fileInput').files[0];
                if(!file) return alert("Sube un archivo primero");
                document.getElementById('generateBtn').innerText = "SUBIENDO...";

                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.secure_url) {
                        let baseUrl = window.location.href.split('index.html')[0];
                        let finalUrl = `${baseUrl}view.html?model=${encodeURIComponent(data.secure_url)}&s=${document.getElementById('scaleInput').value}`;
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
                        document.getElementById('presentation').style.display = 'flex';
                    }
                } catch (err) { alert("Error al subir"); }
                document.getElementById('generateBtn').innerText = "GENERAR QR";
            };

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = (window.innerWidth - 280) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 280, window.innerHeight);
        };

        init();
    </script>
</body>
</html>
