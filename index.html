<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SALA AR - PROYECTO DOCENTE</title>
    
    <!-- Librerías de AR (Solo se activarán en el móvil) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; }
        
        /* ESTILO PARA LA PANTALLA DE LA PC */
        #pc-view {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: white; text-align: center;
        }
        .qr-card { background: white; padding: 30px; border-radius: 20px; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .marcador-container { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px dashed #38bdf8; }
        .marcador-img { width: 180px; border: 15px solid black; display: block; margin: 10px auto; }
        h1 { color: #38bdf8; margin: 0; }

        /* ARREGLO PARA EL ZOOM DEL CELULAR */
        video { width: 100vw !important; height: 100vh !important; margin-left: 0 !important; top: 0 !important; object-fit: cover !important; }
    </style>
</head>

<body>

    <!-- SECCIÓN PC (Solo se muestra si NO estamos en modo AR) -->
    <div id="pc-view">
        <h1>SALA DE DISEÑO 3D</h1>
        <p style="color: #94a3b8;">Muestra esta pantalla en el proyector de la clase</p>
        
        <div class="qr-card">
            <p style="color: #0f172a; font-weight: bold; margin-top: 0;">1. ESCANEA PARA EMPEZAR</p>
            <div id="qrcode"></div>
        </div>

        <div class="marcador-container">
            <p style="margin: 0;">2. APUNTA AQUÍ CON LA CÁMARA</p>
            <img class="marcador-img" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg">
            <p style="font-size: 0.8rem; color: #38bdf8;">Marcador Estándar HIRO</p>
        </div>
    </div>

    <!-- SECCIÓN AR (Solo se inyecta por JavaScript en el celular) -->
    <div id="ar-scene-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isARMode = urlParams.get('mode') === 'ar';

        if (isARMode) {
            // --- ESTAMOS EN EL CELULAR ---
            document.getElementById('pc-view').style.display = 'none';
            
            // Inyectamos la escena AR solo aquí para que la PC no pida cámara
            const arContainer = document.getElementById('ar-scene-container');
            arContainer.innerHTML = `
                <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false">
                    <a-assets>
                        <a-asset-item id="modelo" src="modelo1.glb"></a-asset-item>
                    </assets>
                    <a-marker preset="hiro">
                        <a-entity 
                            gltf-model="#modelo" 
                            scale="1 1 1" 
                            position="0 0 0" 
                            rotation="0 0 0"
                            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
                        </a-entity>
                    </a-marker>
                    <a-entity camera></a-entity>
                </a-scene>
            `;
        } else {
            // --- ESTAMOS EN LA PC ---
            // Generamos el QR que lleva al modo AR
            const arUrl = window.location.href.split('?')[0] + "?mode=ar";
            new QRCode(document.getElementById("qrcode"), {
                text: arUrl,
                width: 220,
                height: 220
            });
        }
    </script>

</body>
</html>
