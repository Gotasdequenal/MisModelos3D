<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #1a1a1a; padding: 25px; display: flex; flex-direction: column; gap: 25px; border-right: 1px solid #333; z-index: 100; }
        h3 { margin: 0; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d1ff; }
        button { padding: 15px; cursor: pointer; font-weight: bold; background: #00d1ff; border: none; border-radius: 8px; color: #000; transition: 0.3s; }
        button:hover { background: #008fb3; transform: scale(1.02); }
        #container3d { flex-grow: 1; position: relative; background: #000; }
        #presentation { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; color: black; }
        .pres-box { text-align: center; }
        .hiro-img { border: 40px solid black; width: 300px; height: 300px; }
        #version-tag { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #444; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>
    <div id="version-tag">VERSION 1.5</div>

    <div id="sidebar">
        <div>
            <h3>1. Subir Modelo</h3>
            <input type="file" id="fileInput" accept=".glb">
        </div>
        <div>
            <h3>2. Escalar Diseño</h3>
            <input type="range" id="scaleInput" min="0.1" max="10" step="0.1" value="1">
            <p style="text-align: right; color:#00d1ff;"><span id="scale-val">1.0</span>x</p>
        </div>
        <button id="generateBtn">GENERAR CÓDIGO QR</button>
    </div>

    <div id="container3d"></div>

    <div id="presentation">
        <button onclick="document.getElementById('presentation').style.display='none'" style="position:absolute; top:20px; left:20px; padding:10px; cursor:pointer;">CERRAR</button>
        <div class="pres-box"><h2>1. ESCANEA EL QR</h2><div id="qrcode"></div></div>
        <div class="pres-box"><h2>2. APUNTA AL MARCADOR</h2><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-img"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, robot;
        const CLOUD_NAME = "dudse9ysg";
        const UPLOAD_PRESET = "Clase_3d";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 280, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.physicallyCorrectLights = true; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(1, 4, 3);
            scene.add(sun);
            scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x222222));

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (txt) => {
                const marker = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ map: txt }));
                marker.rotation.x = -Math.PI / 2;
                marker.position.y = 0.005;
                scene.add(marker);
            });

            const loader = new GLTFLoader();
            new OrbitControls(camera, renderer.domElement);

            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    if(robot) scene.remove(robot);
                    loader.load(URL.createObjectURL(file), (g) => { robot = g.scene; scene.add(robot); });
                }
            };

            document.getElementById('scaleInput').oninput = function() {
                document.getElementById('scale-val').innerText = this.value;
                if(robot) robot.scale.set(this.value, this.value, this.value);
            };

            document.getElementById('generateBtn').onclick = async () => {
                const file = document.getElementById('fileInput').files[0];
                if(!file) return alert("Sube un archivo primero");
                document.getElementById('generateBtn').innerText = "SUBIENDO...";
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.secure_url) {
                        let baseUrl = window.location.href.split('index.html')[0];
                        let finalUrl = `${baseUrl}view.html?model=${encodeURIComponent(data.secure_url)}&s=${document.getElementById('scaleInput').value}`;
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
                        document.getElementById('presentation').style.display = 'flex';
                    }
                } catch (err) { alert("Error al subir"); }
                document.getElementById('generateBtn').innerText = "GENERAR CÓDIGO QR";
            };
            animate();
        }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
