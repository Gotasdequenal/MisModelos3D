<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Realidad Aumentada - Prof. Gotasdequenal</title>
    
    <!-- Librerías de AR basadas en Marcador (No en suelo) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* Instrucciones para la PC */
      #pc-panel {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0f172a; color: white; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        z-index: 1000; text-align: center;
      }
      .card { background: white; padding: 20px; border-radius: 15px; margin: 20px; }
      .marcador-instruccion { width: 150px; border: 5px solid black; margin-top: 10px; }
    </style>
  </head>

  <body>

    <!-- VISTA PARA LA PC: Se oculta en el celular -->
    <div id="pc-panel">
      <h1>SALA DE REALIDAD AUMENTADA</h1>
      <div class="card">
        <p style="color: black; font-weight: bold;">1. Escanea este QR:</p>
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
      </div>
      
      <div style="max-width: 400px; padding: 20px;">
        <p>2. Una vez escaneado, el celular abrirá la cámara.</p>
        <p>3. Apunta la cámara a este recuadro negro (Marcador HIRO):</p>
        <img class="marcador-instruccion" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg">
      </div>
    </div>

    <!-- ESCENA AR: Se activa automáticamente al abrir el link -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <!-- Aquí cargamos tu modelo estándar -->
        <a-asset-item id="miModelo" src="modelo1.glb"></a-asset-item>
      </assets>

      <!-- El Marcador HIRO: El modelo aparecerá PEGADO a él -->
      <a-marker preset="hiro">
        <a-entity 
          gltf-model="#miModelo" 
          scale="1 1 1" 
          position="0 0 0"
          rotation="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Generar el código QR con el link actual + un activador
      const qrLink = window.location.href + "?view=ar";
      new QRCode(document.getElementById("qrcode"), {
        text: qrLink,
        width: 180,
        height: 180
      });

      // Detectar si estamos en el celular para ocultar las instrucciones de la PC
      const params = new URLSearchParams(window.location.search);
      if (window.innerWidth < 800 || params.get('view') === 'ar') {
        document.getElementById('pc-panel').style.display = 'none';
      }
    </script>

  </body>
</html>
