<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor AR Pro - Gotasdequenal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; height: 100vh; overflow: hidden; }
        
        #editor-layout { display: flex; height: 100vh; width: 100%; }

        /* SIDEBAR */
        #sidebar { 
            width: 320px; background: #1e293b; padding: 25px; 
            border-right: 2px solid #334155; display: flex; 
            flex-direction: column; gap: 20px; box-sizing: border-box;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }
        .control-group { background: #334155; padding: 15px; border-radius: 15px; border: 1px solid #475569; }
        label { display: block; font-size: 0.75rem; color: #38bdf8; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        /* EL BOTÓN 3D (Estilo de la imagen) */
        .btn-3d-container {
            margin-top: auto;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .btn-3d {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be);
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.4),
                inset 0 -8px 15px rgba(0,0,0,0.5),
                inset 0 8px 15px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.2s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            outline: none;
        }

        .btn-3d:hover {
            transform: scale(1.05) translateY(-5px);
            filter: brightness(1.1);
        }

        .btn-3d:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 
                0 5px 10px rgba(0,0,0,0.4),
                inset 0 5px 10px rgba(0,0,0,0.6);
        }

        .btn-3d::after {
            content: "GENERAR AR";
            position: absolute;
        }

        /* ZONA DEL MODELO */
        #preview-zone { flex-grow: 1; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        model-viewer { width: 100%; height: 100%; }

        /* PANTALLA PRESENTACIÓN */
        #presentation-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8fafc; color: #1e293b; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .hiro-frame { border: 45px solid black; padding: 40px; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .hiro-img { width: 220px; }
        #btn-back { position: absolute; top: 30px; left: 30px; padding: 12px 25px; border-radius: 50px; border: 2px solid #1e293b; background: transparent; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="editor-layout">
        <div id="sidebar">
            <h2 style="color: #38bdf8; text-align: center; letter-spacing: 2px;">EDITOR 3D</h2>
            
            <div class="control-group">
                <label>Escala: <span id="scale-val">1.0</span>x</label>
                <input type="range" id="scale" min="0.1" max="4" step="0.1" value="1" oninput="actualizar()">
            </div>
            
            <div class="control-group">
                <label>Giro Horiz: <span id="rotate-h-val">0</span>°</label>
                <input type="range" id="rotate-h" min="0" max="360" step="5" value="0" oninput="actualizar()">
            </div>
            
            <div class="control-group">
                <label>Giro Vert: <span id="rotate-v-val">0</span>°</label>
                <input type="range" id="rotate-v" min="-90" max="90" step="5" value="0" oninput="actualizar()">
            </div>

            <div class="btn-3d-container">
                <button class="btn-3d" onclick="mostrarPresentacion()"></button>
            </div>
        </div>

        <div id="preview-zone">
            <model-viewer id="visor" src="modelo1.glb" interaction-prompt="none" shadow-intensity="1.5" environment-image="neutral" exposure="1"></model-viewer>
        </div>
    </div>

    <!-- PANTALLA HIRO -->
    <div id="presentation-view">
        <button id="btn-back" onclick="cerrarPresentacion()">← VOLVER AL EDITOR</button>
        <div class="hiro-frame">
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-img">
        </div>
        <div style="text-align: center; margin-top: 30px;">
            <p style="font-weight: bold; margin-bottom: 15px;">1. ESCANEA EL CÓDIGO QR</p>
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <p style="margin-top: 20px; font-size: 0.9rem; color: #64748b;">2. APUNTA AL CUADRO NEGRO</p>
        </div>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 160, height: 160 });
        const visor = document.getElementById('visor');

        function actualizar() {
            let s = document.getElementById('scale').value;
            let h = document.getElementById('rotate-h').value;
            let v = document.getElementById('rotate-v').value;
            
            document.getElementById('scale-val').innerText = s;
            document.getElementById('rotate-h-val').innerText = h;
            document.getElementById('rotate-v-val').innerText = v;

            // ACTUALIZACIÓN DEL MODELO EN PC
            // Cambiamos la escala interna del modelo, no del contenedor, para que no se corte
            visor.scale = `${s} ${s} ${s}`;
            visor.orientation = `${v}deg ${h}deg 0deg`;
        }

        function mostrarPresentacion() {
            let s = document.getElementById('scale').value;
            let h = document.getElementById('rotate-h').value;
            let v = document.getElementById('rotate-v').value;

            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let finalUrl = baseUrl + "ar.html?s=" + s + "&h=" + h + "&v=" + v;
            
            qr.clear();
            qr.makeCode(finalUrl);

            document.getElementById('presentation-view').style.display = 'flex';
        }

        function cerrarPresentacion() {
            document.getElementById('presentation-view').style.display = 'none';
        }

        window.onload = actualizar;
    </script>
</body>
</html>
