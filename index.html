<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor AR Pro - Gotasdequenal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* PANEL LATERAL */
        #sidebar { 
            width: 320px; background: #1e293b; padding: 20px; 
            border-right: 2px solid #334155; display: flex; 
            flex-direction: column; gap: 10px; z-index: 100;
        }
        .control-group { background: #334155; padding: 12px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.7rem; color: #38bdf8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        
        /* BOTONES GIZMO (MOVIMIENTO) */
        .gizmo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .btn-gizmo { 
            padding: 10px 5px; border: none; border-radius: 6px; color: white; 
            font-weight: bold; cursor: pointer; font-size: 10px; background: #475569;
        }
        .btn-gizmo:hover { filter: brightness(1.2); }
        .x-btn { border-bottom: 3px solid #ef4444; }
        .y-btn { border-bottom: 3px solid #22c55e; }
        .z-btn { border-bottom: 3px solid #3b82f6; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        /* BOTÓN AR ORBE */
        .btn-orbe {
            width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4), inset 0 -5px 10px rgba(0,0,0,0.5);
            color: white; font-weight: bold; align-self: center; margin-top: auto;
        }

        /* ZONA VISOR */
        #preview-zone { 
            flex-grow: 1; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* El robot se mueve visualmente con el JS */
        model-viewer { width: 100%; height: 100%; z-index: 5; position: absolute; --poster-color: transparent; }

        /* EL SUELO HIRO */
        #stage-hiro {
            position: absolute; width: 300px; height: 300px; background: white; border: 25px solid black;
            display: flex; align-items: center; justify-content: center;
            transform: rotateX(75deg); bottom: 15%; z-index: 1; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        #stage-hiro img { width: 70%; transform: rotateX(-10deg); }

        #presentation-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; color: black; z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: #38bdf8; text-align: center; margin: 0;">EDITOR GIZMO 3D</h3>
        
        <div class="control-group">
            <label>ESCALA: <span id="scale-val">1.0</span>x</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>MOVIMIENTO (X, Y, Z)</label>
            <div class="gizmo-grid">
                <button class="btn-gizmo x-btn" onclick="mover('x', 0.2)">X+</button>
                <button class="btn-gizmo y-btn" onclick="mover('y', 0.2)">Y+</button>
                <button class="btn-gizmo z-btn" onclick="mover('z', 0.2)">Z+</button>
                <button class="btn-gizmo x-btn" onclick="mover('x', -0.2)">X-</button>
                <button class="btn-gizmo y-btn" onclick="mover('y', -0.2)">Y-</button>
                <button class="btn-gizmo z-btn" onclick="mover('z', -0.2)">Z-</button>
            </div>
        </div>

        <div class="control-group">
            <label>ROTACIÓN (X, Y, Z)</label>
            <input type="range" id="rotX" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotY" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotZ" min="-180" max="180" value="0" oninput="actualizar()">
        </div>

        <button class="btn-orbe" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <div id="stage-hiro">
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg">
        </div>
        <model-viewer id="visor" src="modelo1.glb" shadow-intensity="1" environment-image="neutral" exposure="1" interaction-prompt="none"></model-viewer>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding:10px;">VOLVER</button>
        <div style="border: 40px solid black; padding: 20px; background: white;"><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="250"></div>
        <div id="qrcode" style="margin-top:20px;"></div>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 220, height: 220 });
        const visor = document.getElementById('visor');
        let pos = { x: 0, y: 0, z: 0 };

        function actualizar() {
            const s = document.getElementById('scale').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;

            // Visual en PC: El robot se mueve y escala sobre el logo Hiro
            visor.style.transform = `scale(${s}) translate(${pos.x * 50}px, ${pos.z * 50}px)`;
            visor.style.top = `${-pos.y * 50}px`; // El eje Y es altura
            visor.orientation = `${rx}deg ${ry}deg ${rz}deg`;
        }

        function mover(eje, valor) {
            pos[eje] = Math.round((pos[eje] + valor) * 10) / 10;
            actualizar();
        }

        function mostrarPresentacion() {
            const val = (id) => document.getElementById(id).value;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            // Enviamos los datos al celular. Multiplicamos escala para que se vea bien.
            let finalUrl = `${baseUrl}ar.html?s=${val('scale')}&rx=${val('rotX')}&ry=${val('rotY')}&rz=${val('rotZ')}&px=${pos.x}&py=${pos.y}&pz=${pos.z}`;
            qr.clear();
            qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }
        window.onload = actualizar;
    </script>
</body>
</html>
