<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TEST BÁSICO AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: white; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #222; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #444; }
        #container3d { flex-grow: 1; position: relative; background: #000; }
        button { padding: 15px; cursor: pointer; font-weight: bold; background: #00d1ff; border: none; border-radius: 5px; }
        #presentation { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: black; }
        .version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div class="version-tag">MODO DIAGNÓSTICO v1.0</div>

    <div id="sidebar">
        <h3>1. SUBIR MODELO</h3>
        <input type="file" id="fileInput" accept=".glb">
        
        <h3>2. ESCALA</h3>
        <input type="range" id="scaleInput" min="0.1" max="10" step="0.1" value="1">
        
        <button id="generateBtn">GENERAR QR</button>
    </div>

    <div id="container3d"></div>

    <div id="presentation">
        <button onclick="document.getElementById('presentation').style.display='none'">CERRAR</button>
        <div id="qrcode" style="margin: 20px;"></div>
        <p>Apunta al marcador Hiro</p>
        <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="200" style="border: 20px solid black;">
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, robot;

        // TUS DATOS DE CLOUDINARY
        const CLOUD_NAME = "dudse9ysg";
        const UPLOAD_PRESET = "Clase_3d";

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 250, window.innerHeight);
        document.getElementById('container3d').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        scene.add(new THREE.GridHelper(10, 10));

        const loader = new GLTFLoader();
        new OrbitControls(camera, renderer.domElement);

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                if(robot) scene.remove(robot);
                loader.load(URL.createObjectURL(file), (g) => {
                    robot = g.scene;
                    scene.add(robot);
                });
            }
        };

        document.getElementById('scaleInput').oninput = function() {
            if(robot) robot.scale.set(this.value, this.value, this.value);
        };

        document.getElementById('generateBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Sube un archivo primero");

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            document.getElementById('generateBtn').innerText = "SUBIENDO...";

            try {
                // Endpoint más básico
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if(data.secure_url) {
                    let baseUrl = window.location.href.split('index.html')[0];
                    let finalUrl = `${baseUrl}view.html?model=${encodeURIComponent(data.secure_url)}&s=${document.getElementById('scaleInput').value}`;
                    
                    document.getElementById('qrcode').innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 250, height: 250 });
                    document.getElementById('presentation').style.display = 'flex';
                } else {
                    alert("Error Cloudinary: " + JSON.stringify(data.error));
                }
            } catch (err) {
                alert("Error de red: " + err.message);
            }
            document.getElementById('generateBtn').innerText = "GENERAR QR";
        };

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
