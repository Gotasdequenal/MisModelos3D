<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* TÍTULO SUPERIOR */
        #header-title { position: absolute; top: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 200; border-bottom: 1px solid #334155; }
        #header-title h1 { margin: 0; font-size: 1.2rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }

        /* IZQUIERDA: BOTONES STACKED (SUBIR/BAJAR) */
        #sidebar-left { width: 150px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 60px; z-index: 100; }
        
        .stacked-btn { transform: rotate(-25deg) skew(25deg); transform-style: preserve-3d; position: relative; width: 80px; height: 32px; border: none; background: transparent; cursor: pointer; }
        .stacked-btn:before { content: ''; position: absolute; bottom: -10px; left: -5px; width: 100%; height: 10px; background: #2a2a2a; transform: skewX(-41deg); }
        .stacked-btn:after { content: ''; position: absolute; top: 5px; left: -9px; width: 9px; height: 100%; background: #2a2a2a; transform: skewY(-49deg); }
        .stacked-btn span { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2a2a2a; color: #fff; font-size: 18px; transition: 0.5s ease-out; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stacked-btn:hover span { z-index: 1000; transition: .3s; color: #fff; }
        .stacked-btn:hover span:nth-child(5) { transform: translate(20px, -20px); opacity: 1; }
        .stacked-btn:hover span:nth-child(4) { transform: translate(15px, -15px); opacity: .8; }
        .stacked-btn:hover span:nth-child(3) { transform: translate(10px, -10px); opacity: .6; }
        .stacked-btn:hover span:nth-child(2) { transform: translate(5px, -5px); opacity: .4; }
        .stacked-btn:hover span:nth-child(1) { transform: translate(0px, 0px); opacity: .2; }
        
        /* Colores personalizados para subir/bajar */
        #btnUp:hover span { background: #52E19F; } /* Verde */
        #btnDown:hover span { background: #ef4444; } /* Rojo */

        /* DERECHA: ESCALA */
        #sidebar-right { width: 100px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .vertical-slider { appearance: slider-vertical; width: 8px; height: 300px; background: #475569; outline: none; cursor: pointer; }
        .scale-txt { margin-top: 15px; font-weight: bold; color: #38bdf8; font-size: 14px; }

        /* VISOR */
        #container3d { flex-grow: 1; position: relative; }
        .hint { position: absolute; bottom: 100px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; font-size: 10px; color: #94a3b8; border: 1px solid #334155; }

        /* BOTÓN GENERAR QR (ESTILO LET'S GO) */
        .Btn-Container { display: flex; width: 190px; height: 50px; background-color: #1d2129; border-radius: 40px; box-shadow: 0px 5px 15px rgba(0,0,0,0.5); justify-content: space-between; align-items: center; border: none; cursor: pointer; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .icon-Container { width: 45px; height: 45px; background-color: #f59aff; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid #1d2129; margin-left: 3px; }
        .text { width: calc(190px - 50px); height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9em; font-weight: bold; letter-spacing: 1px; }
        .Btn-Container:hover .icon-Container svg { animation: arrow 1s linear infinite; }
        @keyframes arrow { 0% { opacity: 0; margin-left: -10px; } 100% { opacity: 1; margin-left: 10px; } }

        /* VISTA PRESENTACIÓN */
        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 1000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; }
        .hiro-marker { border: 45px solid black; padding: 15px; width: 300px; height: 300px; }
    </style>
</head>
<body>

    <div id="header-title">
        <h1>Visualizador de modelo 3D con realidad aumentada</h1>
    </div>

    <div id="sidebar-left">
        <div style="text-align: center;">
            <p style="font-size: 10px; font-weight: bold; color: #52E19F;">SUBIR</p>
            <button class="stacked-btn" id="btnUp">
                <span>▲</span><span>▲</span><span>▲</span><span>▲</span><span>▲</span>
            </button>
        </div>
        <div style="text-align: center;">
            <button class="stacked-btn" id="btnDown">
                <span>▼</span><span>▼</span><span>▼</span><span>▼</span><span>▼</span>
            </button>
            <p style="font-size: 10px; font-weight: bold; color: #ef4444; margin-top: 50px;">BAJAR</p>
        </div>
    </div>

    <div id="container3d">
        <div class="hint">🖱️ Izq: Rotar Robot | 🖱️ Der: Mover X-Z | 🖱️ Fondo: Cámara | ⚙️ Rueda: Zoom</div>
    </div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; margin-bottom: 15px; font-size: 12px; color: #38bdf8; font-weight: bold;">ESCALAR DISEÑO</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
        <div id="scale-val" class="scale-txt">1.0x</div>
    </div>

    <button class="Btn-Container" id="generateBtn">
        <span class="text">LISTO! GO!</span>
        <span class="icon-Container">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 1L15 9L8 17M15 9H1" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
    </button>

    <div id="presentation-view">
        <button id="closeBtn" style="position:absolute; top:30px; left:30px; padding:12px 25px; border-radius: 50px; cursor:pointer; font-weight:bold; border: 1px solid #ccc; background: white;">← VOLVER AL EDITOR</button>
        <div style="text-align:center">
            <h3>1. ESCANEA EL QR</h3>
            <div id="qrcode"></div>
        </div>
        <div style="text-align:center">
            <h3>2. APUNTA AL MARCADOR</h3>
            <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-marker">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, robot;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDraggingModel = false, isRotatingModel = false;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 15, 7.5);
            scene.add(sun);

            scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x222222));

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (txt) => {
                const marker = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5), new THREE.MeshBasicMaterial({ map: txt }));
                marker.rotation.x = -Math.PI / 2;
                scene.add(marker);
            });

            new GLTFLoader().load('modelo1.glb', (gltf) => {
                robot = gltf.scene;
                scene.add(robot);
            });

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', () => { controls.enabled = true; isDraggingModel = isRotatingModel = false; });
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onMouseDown(e) {
            // Ajuste de coordenadas para el mouse (sidebar left mide 150px)
            mouse.x = ((e.clientX - 150) / (window.innerWidth - 250)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if(robot) {
                const intersects = raycaster.intersectObject(robot, true);
                if (intersects.length > 0) {
                    controls.enabled = false;
                    if (e.button === 0) isRotatingModel = true;
                    if (e.button === 2) isDraggingModel = true;
                }
            }
        }

        function onMouseMove(e) {
            if (isRotatingModel) { robot.rotation.y += e.movementX * 0.01; robot.rotation.x += e.movementY * 0.01; }
            if (isDraggingModel) { robot.position.x += e.movementX * 0.01; robot.position.z += e.movementY * 0.01; }
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function onWindowResize() {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        }

        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.1; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.1; };
        document.getElementById('scaleInput').oninput = function() {
            const s = this.value;
            document.getElementById('scale-val').innerText = s + "x";
            if(robot) robot.scale.set(s, s, s);
        };

        document.getElementById('generateBtn').onclick = () => {
            const s = document.getElementById('scaleInput').value;
            const px = robot.position.x.toFixed(2), py = robot.position.y.toFixed(2), pz = robot.position.z.toFixed(2);
            const rx = THREE.MathUtils.radToDeg(robot.rotation.x), ry = THREE.MathUtils.radToDeg(robot.rotation.y), rz = THREE.MathUtils.radToDeg(robot.rotation.z);
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let finalUrl = `${baseUrl}ar.html?s=${s}&px=${px}&py=${py}&pz=${pz}&rx=${rx}&ry=${ry}&rz=${rz}`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
            document.getElementById('presentation-view').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation-view').style.display = 'none';
    </script>
</body>
</html>
