<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de modelo 3D con realidad aumentada</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #header-title { position: absolute; top: 0; width: 100%; text-align: center; padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200; border-bottom: 1px solid #334155; }
        #header-title h1 { margin: 0; font-size: 1.1rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 3px; }

        /* CURSOR HUD INTELIGENTE */
        #custom-cursor { position: fixed; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.2s ease; }
        #cursor-icon { width: 25px; height: 35px; border: 2px solid white; border-radius: 12px; position: relative; background: rgba(0,0,0,0.8); }
        .cursor-btn { position: absolute; top: 0; width: 50%; height: 40%; border-radius: 8px 8px 0 0; }
        .btn-left { left: 0; background: #f59aff; } /* ROSA PARA ROTAR */
        .btn-right { right: 0; background: #38bdf8; } /* AZUL PARA MOVER */
        .cursor-labels { margin-top: 5px; display: flex; gap: 10px; font-size: 10px; font-weight: bold; }
        .lbl-rotar { color: #f59aff; }
        .lbl-mover { color: #38bdf8; }

        /* SIDEBAR IZQUIERDA: BOTONES Y ETIQUETAS DIAGONALES */
        #sidebar-left { width: 150px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 100px; z-index: 100; }
        .btn-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .stacked-btn { transform: rotate(-25deg) skew(25deg); transform-style: preserve-3d; position: relative; width: 80px; height: 32px; border: none; background: transparent; cursor: pointer; }
        .stacked-btn span { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2a2a2a; color: #fff; font-size: 18px; transition: 0.5s ease-out; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stacked-btn:hover span:nth-child(5) { opacity: 1; }
        
        #btnUp:hover span:nth-child(5) { transform: translate(25px, -25px); background: #52E19F; }
        #btnUp:hover span:nth-child(4) { transform: translate(20px, -20px); opacity: .8; }
        #btnUp:hover span:nth-child(3) { transform: translate(15px, -15px); opacity: .6; }
        #btnDown:hover span:nth-child(5) { transform: translate(-25px, 25px); background: #ef4444; }
        #btnDown:hover span:nth-child(4) { transform: translate(-20px, 20px); opacity: .8; }
        #btnDown:hover span:nth-child(3) { transform: translate(-15px, 15px); opacity: .6; }

        .diagonal-label { font-size: 11px; font-weight: bold; transform: rotate(-25deg); position: absolute; white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
        .label-subir { color: #52E19F; bottom: -35px; left: 20px; }
        .label-bajar { color: #ef4444; top: -35px; right: 20px; }

        /* SIDEBAR DERECHA */
        #sidebar-right { width: 100px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .vertical-slider { appearance: slider-vertical; width: 8px; height: 300px; background: #475569; outline: none; }

        /* BOTÓN QR ANIMADO */
        .Btn-Container { display: flex; width: 210px; height: 50px; background-color: #1d2129; border-radius: 40px; box-shadow: 0px 5px 15px rgba(0,0,0,0.5); justify-content: space-between; align-items: center; border: none; cursor: pointer; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; transition: all 0.3s; }
        .icon-Container { width: 42px; height: 42px; background-color: #38bdf8; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid #1d2129; margin-left: 4px; transition: all 0.3s; }
        .text { width: calc(210px - 50px); color: white; font-weight: bold; font-size: 0.8em; letter-spacing: 1px; }
        .Btn-Container:hover .icon-Container { transform: scale(1.1); background-color: #38bdf8; }
        .Btn-Container:hover .icon-Container svg { animation: arrow 1s linear infinite; }
        @keyframes arrow { 0% { opacity: 0; transform: translateX(-5px); } 100% { opacity: 1; transform: translateX(5px); } }

        #container3d { flex-grow: 1; position: relative; }
        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 2000; flex-direction: row; align-items: center; justify-content: center; gap: 80px; }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <div id="cursor-icon">
            <div class="cursor-btn btn-left"></div>
            <div class="cursor-btn btn-right"></div>
        </div>
        <div class="cursor-labels">
            <span class="lbl-rotar">ROTAR</span>
            <span class="lbl-mover">MOVER</span>
        </div>
    </div>

    <div id="header-title"><h1>Visualizador de modelo 3D con realidad aumentada</h1></div>

    <div id="sidebar-left">
        <div class="btn-wrapper">
            <button class="stacked-btn" id="btnUp"><span>▲</span><span>▲</span><span>▲</span><span>▲</span><span>▲</span></button>
            <span class="diagonal-label label-subir">SUBIR</span>
        </div>
        <div class="btn-wrapper">
            <span class="diagonal-label label-bajar">BAJAR</span>
            <button class="stacked-btn" id="btnDown"><span>▼</span><span>▼</span><span>▼</span><span>▼</span><span>▼</span></button>
        </div>
    </div>

    <div id="container3d"></div>

    <div id="sidebar-right">
        <span style="writing-mode: vertical-rl; margin-bottom: 15px; font-size: 11px; color: #38bdf8; font-weight: bold;">ESCALAR DISEÑO</span>
        <input type="range" id="scaleInput" class="vertical-slider" min="0.1" max="15" step="0.1" value="1">
        <div id="scale-val" style="margin-top:10px; font-weight:bold; color:#38bdf8;">1.0x</div>
    </div>

    <button class="Btn-Container" id="generateBtn">
        <span class="text">GENERAR CÓDIGO QR</span>
        <span class="icon-Container">
          <svg width="18" height="18" viewBox="0 0 16 18" fill="none"><path d="M8 1L15 9L8 17M15 9H1" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
    </button>

    <div id="presentation-view">
        <button id="closeBtn" style="position:absolute; top:30px; left:30px; padding:12px 25px; border-radius:50px; cursor:pointer;">← VOLVER</button>
        <div style="text-align:center"><h3>1. ESCANEA EL QR</h3><div id="qrcode"></div></div>
        <div style="text-align:center"><h3>2. APUNTA AL MARCADOR</h3><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" style="border:40px solid black; width:280px;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, robot;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false, isRotating = false;

        const cursorHUD = document.getElementById('custom-cursor');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 15, 10);
            scene.add(sun);

            scene.add(new THREE.GridHelper(15, 30, 0x444444, 0x222222));
            const axes = new THREE.AxesHelper(6);
            scene.add(axes);

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (t) => {
                const marker = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ map: t }));
                marker.rotation.x = -Math.PI / 2;
                marker.position.y = 0.01;
                scene.add(marker);
            });

            new GLTFLoader().load('modelo1.glb', (g) => { robot = g.scene; scene.add(robot); });

            controls = new OrbitControls(camera, renderer.domElement);
            controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onMouseMove(e) {
            cursorHUD.style.left = (e.clientX + 15) + 'px';
            cursorHUD.style.top = (e.clientY + 15) + 'px';

            mouse.x = ((e.clientX - 150) / (window.innerWidth - 250)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if(robot) {
                const hits = raycaster.intersectObject(robot, true);
                if(hits.length > 0) {
                    cursorHUD.style.opacity = "1";
                    document.body.style.cursor = "none";
                } else if(!isDragging && !isRotating) {
                    cursorHUD.style.opacity = "0";
                    document.body.style.cursor = "default";
                }

                if(isDragging) {
                    const planeNormal = new THREE.Vector3(0, 1, 0);
                    const plane = new THREE.Plane(planeNormal, -robot.position.y);
                    const point = new THREE.Vector3();
                    raycaster.ray.intersectPlane(plane, point);
                    robot.position.x = point.x;
                    robot.position.z = point.z;
                }
                if(isRotating) {
                    robot.rotation.y += e.movementX * 0.01;
                    robot.rotation.x += e.movementY * 0.01;
                }
            }
        }

        function onMouseDown(e) {
            const hits = raycaster.intersectObject(robot, true);
            if(hits.length > 0) {
                controls.enabled = false;
                if(e.button === 0) isRotating = true;
                if(e.button === 2) isDragging = true;
            }
        }

        function onMouseUp() { controls.enabled = true; isDragging = isRotating = false; }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        function onWindowResize() {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        }

        document.getElementById('btnUp').onclick = () => { if(robot) robot.position.y += 0.2; };
        document.getElementById('btnDown').onclick = () => { if(robot) robot.position.y -= 0.2; };
        document.getElementById('scaleInput').oninput = function() {
            const val = parseFloat(this.value);
            if(robot) robot.scale.set(val, val, val);
            document.getElementById('scale-val').innerText = val.toFixed(1) + "x";
        };

        document.getElementById('generateBtn').onclick = () => {
            const s = document.getElementById('scaleInput').value;
            const p = robot.position, r = robot.rotation;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            let finalUrl = `${baseUrl}ar.html?s=${s}&px=${p.x.toFixed(2)}&py=${p.y.toFixed(2)}&pz=${p.z.toFixed(2)}&rx=${THREE.MathUtils.radToDeg(r.x).toFixed(0)}&ry=${THREE.MathUtils.radToDeg(r.y).toFixed(0)}&rz=${THREE.MathUtils.radToDeg(r.z).toFixed(0)}`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
            document.getElementById('presentation-view').style.display = 'flex';
        };
        document.getElementById('closeBtn').onclick = () => document.getElementById('presentation-view').style.display = 'none';
    </script>
</body>
</html>
