<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Sobre Marcador - Prof. Gotasdequenal</title>
    <!-- Librerías de AR.js y A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
      #qr-container {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: white; padding: 20px; border-radius: 15px; text-align: center;
        z-index: 999; color: black; font-family: sans-serif;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <!-- PANTALLA INICIAL PARA PC (Muestra el QR y el marcador) -->
    <div id="qr-container">
      <h1>SALA DE REALIDAD AUMENTADA</h1>
      <p>1. Escanea este QR con tu celular:</p>
      <div id="qrcode" style="display: flex; justify-content: center; margin: 20px;"></div>
      <p>2. Luego apunta la cámara hacia este marcador:</p>
      <img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="150">
    </div>

    <!-- ESCENA DE REALIDAD AUMENTADA (Se activa al abrir en el móvil) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Cargamos el modelo modelo1.glb -->
      <a-assets>
        <a-asset-item id="modelo" src="modelo1.glb"></a-asset-item>
      </assets>

      <!-- El "marcador" que la cámara buscará (HIRO) -->
      <a-marker preset="hiro">
        <a-entity 
          gltf-model="#modelo" 
          scale="0.5 0.5 0.5" 
          position="0 0 0" 
          rotation="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Generar el QR automáticamente
      new QRCode(document.getElementById("qrcode"), {
        text: window.location.href + "?mode=scan",
        width: 200, height: 200
      });

      // Si detectamos que es celular o viene con el modo scan, ocultamos el panel
      const urlParams = new URLSearchParams(window.location.search);
      if (window.innerWidth < 800 || urlParams.get('mode') === 'scan') {
        document.getElementById('qr-container').style.display = 'none';
      }
    </script>
  </body>
</html>
