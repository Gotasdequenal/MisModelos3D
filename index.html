<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor AR Pro v5 - Gotasdequenal</title>
    <!-- Motores 3D -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL */
        #sidebar { 
            width: 320px; background: #1e293b; padding: 20px; 
            border-right: 2px solid #334155; display: flex; 
            flex-direction: column; gap: 10px; z-index: 100; overflow-y: auto;
        }
        .control-group { background: #334155; padding: 12px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.65rem; color: #38bdf8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        /* BOTÓN ORBE AR */
        .btn-ar-orbe {
            width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            color: white; font-weight: bold; align-self: center; margin-top: auto; transition: 0.2s;
        }
        .btn-ar-orbe:active { transform: scale(0.9); }

        /* ZONA DEL VISOR */
        #preview-zone { flex-grow: 1; position: relative; background: #000; }

        /* PANTALLA DE ESCANEO */
        #presentation-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; color: black; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* MARCADOR HIRO PERFECTO (BORDE NEGRO GRUESO) */
        .hiro-container {
            background: black; padding: 60px; /* Borde negro muy grueso */
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .hiro-white-bg {
            background: white; width: 220px; height: 220px;
            display: flex; align-items: center; justify-content: center;
        }
        .hiro-black-inner {
            background: black; width: 110px; height: 110px;
            display: flex; align-items: center; justify-content: center;
        }
        .hiro-text { color: white; font-family: Arial, sans-serif; font-weight: bold; font-size: 28px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: #38bdf8; text-align: center; margin: 0; font-size: 1.2rem;">ESTACIÓN 3D PRO</h2>
        
        <div class="control-group">
            <label>ESCALA: <span id="scale-val">1</span>X</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>POSICIÓN (X, Y, Z)</label>
            <label style="color:#aaa; font-size:9px">HORIZONTAL</label>
            <input type="range" id="posX" min="-4" max="4" step="0.1" value="0" oninput="actualizar()">
            <label style="color:#aaa; font-size:9px">ALTURA</label>
            <input type="range" id="posY" min="-2" max="4" step="0.1" value="0" oninput="actualizar()">
            <label style="color:#aaa; font-size:9px">PROFUNDIDAD</label>
            <input type="range" id="posZ" min="-4" max="4" step="0.1" value="0" oninput="actualizar()">
        </div>

        <div class="control-group">
            <label>ROTACIÓN (X, Y, Z)</label>
            <input type="range" id="rotX" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotY" min="-180" max="180" value="0" oninput="actualizar()">
            <input type="range" id="rotZ" min="-180" max="180" value="0" oninput="actualizar()">
        </div>

        <button class="btn-ar-orbe" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
            <a-sky color="#0f172a"></a-sky>
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; intensity: 0.8; position: 1 3 2"></a-entity>

            <!-- Marcador Hiro en el suelo con borde negro real -->
            <a-entity position="0 0 0">
                <a-plane rotation="-90 0 0" width="2" height="2" color="black" position="0 0.01 0"></a-plane>
                <a-plane rotation="-90 0 0" width="1.4" height="1.4" color="white" position="0 0.02 0"></a-plane>
                <a-plane rotation="-90 0 0" width="0.7" height="0.7" color="black" position="0 0.03 0"></a-plane>
            </a-entity>
            <a-grid width="10" height="10" color="#444" opacity="0.3"></a-grid>

            <!-- EL ROBOT -->
            <a-entity id="robot" gltf-model="#modelo" position="0 0 0"></a-entity>

            <!-- Cámara Orbit -->
            <a-entity camera orbit-controls="target: 0 0 0; initialPosition: 0 2 4;"></a-entity>
        </a-scene>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding: 10px; cursor: pointer;">CERRAR</button>
        
        <!-- Marcador Hiro Vectorizado (Detección a distancia) -->
        <div class="hiro-container">
            <div class="hiro-white-bg">
                <div class="hiro-black-inner">
                    <span class="hiro-text">Hiro</span>
                </div>
            </div>
        </div>

        <div id="qrcode"></div>
        <p style="font-weight: bold; margin-top: 15px; font-family: Arial;">1. ESCANEA | 2. APUNTA AL CUADRO NEGRO</p>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });

        function actualizar() {
            const robot = document.getElementById('robot');
            if(!robot) return;

            const s = document.getElementById('scale').value;
            const px = document.getElementById('posX').value;
            const py = document.getElementById('posY').value;
            const pz = document.getElementById('posZ').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;

            robot.setAttribute('scale', `${s} ${s} ${s}`);
            robot.setAttribute('position', `${px} ${py} ${pz}`);
            robot.setAttribute('rotation', `${rx} ${ry} ${rz}`);
        }

        function mostrarPresentacion() {
            const val = (id) => document.getElementById(id).value;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            // Generar URL con los 7 parámetros
            let finalUrl = `${baseUrl}ar.html?s=${val('scale')}&px=${val('posX')}&py=${val('posY')}&pz=${val('posZ')}&rx=${val('rotX')}&ry=${val('rotY')}&rz=${val('rotZ')}`;
            
            qr.clear();
            qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }

        // Inicializar al cargar
        window.onload = () => { setTimeout(actualizar, 1000); };
    </script>
</body>
</html>
