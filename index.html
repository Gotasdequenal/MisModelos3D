<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación 3D AR - Gotasdequenal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: #1e293b; padding: 20px; border-right: 2px solid #334155; display: flex; flex-direction: column; gap: 10px; z-index: 100; overflow-y: auto; }
        .control-group { background: #334155; padding: 12px; border-radius: 12px; border: 1px solid #475569; }
        label { display: block; font-size: 0.65rem; color: #38bdf8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        #preview-zone { flex-grow: 1; position: relative; background: #000; }
        
        .btn-ar-orbe { 
            width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; 
            background: radial-gradient(circle at 30% 30%, #00f2fe, #0077be); 
            color: white; font-weight: bold; align-self: center; margin-top: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.2s;
        }

        #presentation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .hiro-marker { border: 60px solid black; padding: 40px; background: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: #38bdf8; text-align: center; margin: 0; font-size: 1.2rem;">EDITOR 3D PRO</h2>
        
        <div class="control-group">
            <label>ESCALA: <span id="scale-val">1</span>X</label>
            <input type="range" id="scale" min="0.1" max="10" step="0.1" value="1" oninput="actualizarModelo()">
        </div>

        <div class="control-group">
            <label>POSICIÓN (X: Horiz | Y: Altura)</label>
            <input type="range" id="posX" min="-5" max="5" step="0.1" value="0" oninput="actualizarModelo()">
            <input type="range" id="posY" min="-2" max="5" step="0.1" value="0" oninput="actualizarModelo()">
        </div>

        <div class="control-group">
            <label>ROTACIÓN (X, Y, Z)</label>
            <input type="range" id="rotX" min="-180" max="180" value="0" oninput="actualizarModelo()">
            <input type="range" id="rotY" min="-180" max="180" value="0" oninput="actualizarModelo()">
            <input type="range" id="rotZ" min="-180" max="180" value="0" oninput="actualizarModelo()">
        </div>

        <button class="btn-ar-orbe" onclick="mostrarPresentacion()">AR</button>
    </div>

    <div id="preview-zone">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
            <a-sky color="#0f172a"></a-sky>
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; intensity: 0.8; position: 1 3 2"></a-entity>

            <a-entity position="0 0 0">
                <a-grid width="10" height="10" color="#444"></a-grid>
                <a-entity line="start: -5 0 0; end: 5 0 0; color: #ef4444"></a-entity>
                <a-entity line="start: 0 0 -5; end: 0 0 5; color: #3b82f6"></a-entity>
                <a-entity line="start: 0 0 0; end: 0 5 0; color: #22c55e"></a-entity>
            </a-entity>

            <a-plane position="0 0.01 0" rotation="-90 0 0" width="2" height="2" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg"></a-plane>

            <a-entity id="robot" gltf-model="#modelo" position="0 0 0"></a-entity>

            <a-entity id="camera" camera orbit-controls="target: 0 1 0; initialPosition: 0 2 4;"></a-entity>
        </a-scene>
    </div>

    <div id="presentation-view">
        <button onclick="document.getElementById('presentation-view').style.display='none'" style="position:absolute; top:20px; left:20px; padding: 10px; cursor: pointer;">Cerrar</button>
        <div class="hiro-marker"><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" width="280"></div>
        <div id="qrcode"></div>
    </div>

    <script>
        var qr = new QRCode(document.getElementById("qrcode"), { width: 250, height: 250 });
        const robot = document.getElementById('robot');

        function actualizarModelo() {
            const s = document.getElementById('scale').value;
            const px = document.getElementById('posX').value;
            const py = document.getElementById('posY').value;
            const rx = document.getElementById('rotX').value;
            const ry = document.getElementById('rotY').value;
            const rz = document.getElementById('rotZ').value;
            
            document.getElementById('scale-val').innerText = s;
            document.getElementById('posY-val').innerText = py;

            robot.setAttribute('scale', `${s} ${s} ${s}`);
            robot.setAttribute('rotation', `${rx} ${ry} ${rz}`);
            robot.setAttribute('position', `${px} ${py} 0`);
        }

        function mostrarPresentacion() {
            const val = (id) => document.getElementById(id).value;
            let baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            let finalUrl = `${baseUrl}ar.html?s=${val('scale')}&px=${val('posX')}&py=${val('posY')}&rx=${val('rotX')}&ry=${val('rotY')}&rz=${val('rotZ')}`;
            qr.clear();
            qr.makeCode(finalUrl);
            document.getElementById('presentation-view').style.display = 'flex';
        }
        window.onload = actualizarModelo;
    </script>
</body>
</html>
