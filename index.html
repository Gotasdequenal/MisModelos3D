<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <!-- Escena AR con Hiro + Persistencia -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="modelo" src=""></a-asset-item>
        </a-assets>
        
        <a-marker preset="hiro">
            <a-entity id="entidad" gltf-model="#modelo" scale="0.5 0.5 0.5"></a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const modelUrl = decodeURIComponent(params.get('model'));
        document.getElementById('modelo').setAttribute('src', modelUrl);
        
        // Mantener visible aunque se pierda el marcador
        const marker = document.querySelector('a-marker');
        marker.addEventListener('markerLost', () => {
            document.getElementById('entidad').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
