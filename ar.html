<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor AR Estudiante</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Fix para evitar el zoom y ajustar la cámara al 100% */
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            margin-left: 0 !important;
            top: 0 !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <!-- Configuramos la cámara con resoluciones fijas para evitar el zoom -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720;" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo" src="modelo1.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#modelo" 
                scale="1 1 1" 
                position="0 0 0" 
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
