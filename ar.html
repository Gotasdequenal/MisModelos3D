<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #arjs-video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: fixed !important; top: 0; left: 0; }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false" renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;">
        
        <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
        
        <!-- CONFIGURACIÓN DE LUZ NIVEL EXPERTO (Igual que en ImageToSTL) -->
        <a-entity light="type: ambient; intensity: 3;"></a-entity>
        <a-entity light="type: directional; intensity: 2.5; position: 1 4 3;"></a-entity>
        <a-entity light="type: point; intensity: 2; position: -2 2 2;"></a-entity>
        <a-entity light="type: hemisphere; intensity: 1.5; color: #ffffff; groundColor: #000000;"></a-entity>
        
        <a-marker preset="hiro" smooth="true" smoothCount="5">
            <a-entity id="entidad" gltf-model="#modelo"></a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const p = new URLSearchParams(window.location.search);
        const s = p.get('s') || "1";
        const px = p.get('px') || "0";
        const py = p.get('py') || "0";
        const pz = p.get('pz') || "0";
        const rx = p.get('rx') || "0";
        const ry = p.get('ry') || "0";
        const rz = p.get('rz') || "0";

        const el = document.getElementById('entidad');
        el.setAttribute('scale', `${s} ${s} ${s}`);
        el.setAttribute('position', `${px} ${py} ${pz}`);
        el.setAttribute('rotation', `${rx} ${ry} ${rz}`);

        // Forzar ajuste de video para eliminar franja negra
        window.addEventListener('resize', () => {
            const v = document.querySelector('#arjs-video');
            if(v) { v.style.width = window.innerWidth + 'px'; v.style.height = window.innerHeight + 'px'; }
        });
    </script>
</body>
</html>
