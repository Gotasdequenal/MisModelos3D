<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        /* FORZAR PANTALLA COMPLETA ABSOLUTA */
        #arjs-video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: fixed !important; 
            top: 0; left: 0; z-index: -1; margin: 0 !important;
        }
        .a-canvas { width: 100% !important; height: 100% !important; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;" vr-mode-ui="enabled: false" renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true;">
        
        <a-assets><a-asset-item id="modelo" src="modelo1.glb"></a-asset-item></a-assets>
        
        <!-- Iluminación de Estudio para detalles PBR -->
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 2; position: 1 4 3;"></a-entity>
        <!-- Simulamos un cielo para los reflejos del robot -->
        <a-sky color="#fff" material="opacity: 0; transparent: true"></a-sky>
        
        <a-marker preset="hiro" id="marker" emitevents="true">
            <a-entity id="entidad" gltf-model="#modelo"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
    <script>
        const p = new URLSearchParams(window.location.search);
        const s = parseFloat(p.get('s') || "1") * 0.45; 
        const el = document.getElementById('entidad');
        el.setAttribute('scale', `${s} ${s} ${s}`);
        el.setAttribute('position', `${p.get('px')} ${p.get('py')} ${p.get('pz')}`);
        el.setAttribute('rotation', `${p.get('rx')} ${p.get('ry')} ${p.get('rz')}`);
        
        document.getElementById('marker').addEventListener('markerLost', () => { el.setAttribute('visible', 'true'); });

        // Corrección de franja negra/azul forzada
        setInterval(() => {
            const video = document.querySelector('#arjs-video');
            if (video) { 
                video.style.width = window.innerWidth + 'px'; 
                video.style.height = window.innerHeight + 'px'; 
            }
        }, 500);
    </script>
</body>
</html>
