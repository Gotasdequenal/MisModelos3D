<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Realidad Aumentada</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }
        .ar-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 18px 35px; background: #00d1ff; color: white; border: none; border-radius: 50px; font-weight: bold; z-index: 100; box-shadow: 0 5px 20px rgba(0,209,255,0.5); font-size: 1rem; }
    </style>
</head>
<body>
    <model-viewer id="ar-visor" src="" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" environment-image="neutral" exposure="1.2">
        <button slot="ar-button" class="ar-btn">✨ VER EN MI ESPACIO</button>
    </model-viewer>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('model');
        const s = p.get('s') || "1";
        if(m) {
            const v = document.getElementById('ar-visor');
            v.src = decodeURIComponent(m);
            v.scale = `${s} ${s} ${s}`;
        }
    </script>
</body>
</html>
