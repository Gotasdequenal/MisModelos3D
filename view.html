<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #arjs-video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: fixed !important; top: 0; left: 0; z-index: -1;
        }
        .a-canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    <!-- Renderizado con corrección de color pero luces más potentes -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false" renderer="colorManagement: true;">
        
        <a-assets><a-asset-item id="modelo" src=""></a-asset-item></a-assets>

        <!-- ILUMINACIÓN REFORZADA PARA DETALLES -->
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 1.8; position: 1 4 3;"></a-entity>
        <a-entity light="type: hemisphere; color: #ffffff; groundColor: #000000; intensity: 1.2;"></a-entity>
        
        <a-marker preset="hiro">
            <a-entity id="entidad" gltf-model="" position="0 0 0" scale="1 1 1"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('model');
        const s = p.get('s') || "1";
        if(m) {
            const el = document.getElementById('entidad');
            // Usamos decode para asegurar que la URL del modelo sea correcta
            el.setAttribute('gltf-model', decodeURIComponent(m));
            el.setAttribute('scale', `${s} ${s} ${s}`);
        }
    </script>
</body>
</html>
