<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style> 
        body { margin: 0; overflow: hidden; } 
        #floorMode { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        .btn-surface { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 200; padding: 15px 30px; background: #00d1ff; border-radius: 50px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro"><a-entity id="entidad" gltf-model=""></a-entity></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <model-viewer id="floorMode" ar ar-modes="webxr scene-viewer" camera-controls shadow-intensity="1"></model-viewer>
    <button class="btn-surface" onclick="document.getElementById('floorMode').activateAR()">Ver en superficie plana</button>

    <script>
        const modelUrl = new URLSearchParams(window.location.search).get('model');
        document.getElementById('entidad').setAttribute('gltf-model', modelUrl);
        document.getElementById('floorMode').src = modelUrl;
        
        // Persistencia Hiro
        document.querySelector('a-marker').addEventListener('markerLost', () => {
            document.getElementById('entidad').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
