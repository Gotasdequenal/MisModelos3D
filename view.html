<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Librerías para Marcador (Hiro) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Librería para Superficie (Google) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* CÓDIGO CÁMARA 1.5 (INTACTO) */
        #arjs-video { 
            width: 100vw !important; 
            height: 100vh !important; 
            object-fit: cover !important; 
            margin-left: 0 !important; 
            top: 0 !important;
            position: fixed !important;
        }
        .a-canvas { width: 100% !important; height: 100% !important; }

        /* BOTÓN CAMBIO DE MODO */
        #btn-cambiar-modo {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background: #00d1ff;
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,209,255,0.4);
            cursor: pointer;
            text-transform: uppercase;
            font-family: sans-serif;
        }

        /* OCULTAR VISOR DE SUPERFICIE INICIALMENTE */
        model-viewer {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5000;
        }

        /* ETIQUETA DE VERSION */
        #version-tag { 
            position: fixed; 
            bottom: 10px; 
            right: 10px; 
            font-size: 10px; 
            color: white; 
            z-index: 1000; 
            font-weight: bold; 
            opacity: 0.5; 
            pointer-events: none; 
            font-family: sans-serif;
        }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    
    <div id="version-tag">VERSION 1.6</div>

    <!-- BOTÓN DE CONTROL -->
    <button id="btn-cambiar-modo">✨ PONER EN SUPERFICIE</button>

    <!-- MODO 1: MARCADOR (CÓDIGO 1.5 INTACTO) -->
    <a-scene id="escena-marcador" embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-entity id="entidad" gltf-model="" position="0 0 0" scale="1 1 1"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <!-- MODO 2: SUPERFICIE (OCULTO POR DEFECTO) -->
    <model-viewer 
        id="visor-superficie" 
        src="" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        environment-image="neutral">
    </model-viewer>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('model');
        const s = p.get('s') || "1";
        
        const entidadMarcador = document.getElementById('entidad');
        const visorSuperficie = document.getElementById('visor-superficie');
        const btnModo = document.getElementById('btn-cambiar-modo');
        const escenaMarcador = document.getElementById('escena-marcador');

        // Configuración inicial de ambos modos
        if(m) {
            const urlFinal = decodeURIComponent(m);
            // Aplicar al modo marcador
            entidadMarcador.setAttribute('gltf-model', urlFinal);
            entidadMarcador.setAttribute('scale', `${s} ${s} ${s}`);
            
            // Aplicar al modo superficie
            visorSuperficie.src = urlFinal;
            visorSuperficie.scale = `${s} ${s} ${s}`;
        }

        // LÓGICA DE CAMBIO INSTANTÁNEO
        btnModo.addEventListener('click', () => {
            // 1. Ocultar escena de marcador
            escenaMarcador.style.display = 'none';
            // 2. Mostrar componente de superficie
            visorSuperficie.style.display = 'block';
            // 3. Activar Realidad Aumentada de Google instantáneamente
            visorSuperficie.activateAR();
            // 4. Ocultar botón después del clic
            btnModo.style.display = 'none';
        });
    </script>
</body>
</html>
