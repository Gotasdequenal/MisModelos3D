<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        
        /* FIX CÁMARA 100% REAL */
        #arjs-video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: fixed !important; top: 0; left: 0; z-index: -1; 
        }
        .a-canvas { width: 100% !important; height: 100% !important; position: fixed; top: 0; left: 0; }

        /* BOTÓN DE CAMBIO DE MODO */
        .switch-mode-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            padding: 20px 40px; background: #00d1ff; color: #000; border: none; 
            border-radius: 50px; font-weight: bold; z-index: 9999; 
            box-shadow: 0 0 20px rgba(0,209,255,0.8); font-size: 1rem; cursor: pointer;
        }

        /* OCULTAR PREVISUALIZACIÓN DE MODEL-VIEWER */
        model-viewer { 
            display: none; width: 100%; height: 100%; position: fixed; top:0; left:0; z-index: 10000;
        }
    </style>
</head>
<body style="margin: 0; background: transparent;">

    <!-- BOTÓN PARA CAMBIAR A MODO SUELO -->
    <button class="switch-mode-btn" id="goFloor">💎 USAR MODO SUELO (ALTA CALIDAD)</button>

    <!-- MODO 1: MARCADOR HIRO (DETECCIÓN MEJORADA) -->
    <a-scene id="hiroScene" embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false" renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;">
        <a-assets><a-asset-item id="modelo" src=""></a-asset-item></a-assets>
        
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 1.5; position: 1 4 3;"></a-entity>

        <a-marker preset="hiro" id="marker" emitevents="true" smooth="true" smoothCount="10">
            <a-entity id="entidad" gltf-model="#modelo"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <!-- MODO 2: SUELO (SKIP PREVIEW) -->
    <model-viewer id="floorViewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" environment-image="neutral" exposure="1.3">
        <!-- El botón "Poner en mi mesa" de Google saldrá automáticamente al activar AR -->
    </model-viewer>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = decodeURIComponent(p.get('model'));
        const s = parseFloat(p.get('s') || "1") * 0.45;
        const el = document.getElementById('entidad');
        const fv = document.getElementById('floorViewer');

        if(m && m !== "null") {
            el.setAttribute('gltf-model', m);
            el.setAttribute('scale', `${s} ${s} ${s}`);
            el.setAttribute('position', `${p.get('px')} ${p.get('py')} ${p.get('pz')}`);
            el.setAttribute('rotation', `${p.get('rx')*57.3} ${p.get('ry')*57.3} ${p.get('rz')*57.3}`);
            fv.src = m;
        }

        // Lógica de persistencia: si se pierde el Hiro, el modelo no se oculta de inmediato
        document.getElementById('marker').addEventListener('markerLost', () => { 
            setTimeout(() => { if(!document.getElementById('marker').visible) el.setAttribute('visible', 'true'); }, 500);
        });

        // Al pulsar el botón, activamos la AR de Google inmediatamente
        document.getElementById('goFloor').onclick = () => {
            fv.style.display = 'block';
            fv.activateAR(); // Salta directamente a buscar el suelo
        };

        // Forzar ajuste de pantalla completa cada segundo para evitar franjas negras
        setInterval(() => {
            const v = document.querySelector('#arjs-video');
            if (v) { v.style.width = window.innerWidth + 'px'; v.style.height = window.innerHeight + 'px'; }
        }, 1000);
    </script>
</body>
</html>
