<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        model-viewer { width: 100%; height: 100%; }
        /* Botón de AR personalizado */
        .ar-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            padding: 20px 40px; background: #00d1ff; border: none; border-radius: 50px; 
            font-weight: bold; font-size: 16px; cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
                  ar 
                  ar-modes="webxr scene-viewer quick-look" 
                  camera-controls 
                  tone-mapping="neutral" 
                  shadow-intensity="1">
        
        <button slot="ar-button" class="ar-btn">
            VER EN MI ESPACIO
        </button>
    </model-viewer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const modelUrl = decodeURIComponent(params.get('model'));
        const scale = params.get('s') || 1;
        const viewer = document.getElementById('viewer');

        if(modelUrl) {
            viewer.src = modelUrl;
            viewer.scale = `${scale} ${scale} ${scale}`;
        }

        // Activación automática del modo AR al cargar
        window.onload = () => {
            setTimeout(() => {
                const arButton = viewer.shadowRoot.querySelector('#ar-button');
                if(arButton) arButton.click();
            }, 1000);
        };
    </script>
</body>
</html>
