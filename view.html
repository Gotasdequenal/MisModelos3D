<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style> 
        body { margin: 0; overflow: hidden; } 
        #floorMode { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: white; }
        .btn-surface { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 15px 30px; background: #00d1ff; border-radius: 50px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <!-- Cámara de AR.js se inicializa aquí -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-entity id="modeloHiro" gltf-model=""></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <model-viewer id="floorMode" ar ar-modes="webxr scene-viewer" camera-controls></model-viewer>
    <button class="btn-surface" onclick="activarSuperficie()">Ver en superficie plana</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = decodeURIComponent(params.get('model'));
        document.getElementById('modeloHiro').setAttribute('gltf-model', url);
        const fv = document.getElementById('floorMode');
        fv.src = url;

        function activarSuperficie() {
            fv.style.display = 'block';
            fv.activateAR();
        }

        // Persistencia
        document.querySelector('a-marker').addEventListener('markerLost', () => {
            document.getElementById('modeloHiro').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
