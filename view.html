<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #arjs-video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: fixed !important; top: 0; left: 0; z-index: -1;
        }
        .a-canvas { width: 100% !important; height: 100% !important; }
        #version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: white; z-index: 1000; font-weight: bold; opacity: 0.5; pointer-events: none; font-family: sans-serif; }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    <div id="version-tag">VERSION 1.9</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-entity id="entidad" gltf-model="" position="0 0 0" scale="1 1 1"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('model');
        const s = p.get('s') || "1";
        const py = p.get('py') || "0"; // Recibimos la altura
        const rx = p.get('rx') || "0";
        const ry = p.get('ry') || "0";
        const rz = p.get('rz') || "0";

        if(m) {
            const el = document.getElementById('entidad');
            el.setAttribute('gltf-model', decodeURIComponent(m));
            el.setAttribute('scale', `${s} ${s} ${s}`);
            el.setAttribute('position', `0 ${py} 0`); // Aplicamos la altura
            el.setAttribute('rotation', `${rx} ${ry} ${rz}`);
        }
    </script>
</body>
</html>
