<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador 3D AR - Gotasdequenal</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: #1a1a1a; padding: 25px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #333; z-index: 100; overflow-y: auto; }
        h3 { margin: 0; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        /* SLIDERS */
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d1ff; }
        .val-label { text-align: right; font-size: 12px; color: #00d1ff; margin-top: -5px; }

        button { padding: 15px; cursor: pointer; font-weight: bold; background: #00d1ff; border: none; border-radius: 8px; color: #000; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #008fb3; transform: scale(1.02); }

        /* VISOR */
        #container3d { flex-grow: 1; position: relative; background: #000; }
        
        /* PANTALLA PRESENTACIÓN */
        #presentation { 
            display: none; position: fixed; inset: 0; background: white; z-index: 2000; 
            flex-direction: row; align-items: center; justify-content: center; gap: 80px; color: black; 
        }
        .hiro-img { border: 40px solid black; width: 300px; height: 300px; }
        #closeBtn { position: absolute; top: 20px; left: 20px; background: #eee; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; font-weight: bold; }

        #version-tag { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #444; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>
    <div id="version-tag">VERSION 1.6</div>

    <div id="sidebar">
        <div class="control-group">
            <h3>1. Subir Modelo</h3>
            <input type="file" id="fileInput" accept=".glb">
        </div>
        
        <div class="control-group">
            <h3>2. Escala</h3>
            <input type="range" id="scaleInput" min="0.1" max="10" step="0.1" value="1">
            <div class="val-label"><span id="scale-val">1.0</span>x</div>
        </div>

        <div class="control-group">
            <h3>3. Rotación del Modelo</h3>
            <label style="font-size: 10px; color: #555;">EJE X</label>
            <input type="range" id="rotX" min="-180" max="180" step="1" value="0">
            
            <label style="font-size: 10px; color: #555;">EJE Y</label>
            <input type="range" id="rotY" min="-180" max="180" step="1" value="0">
            
            <label style="font-size: 10px; color: #555;">EJE Z</label>
            <input type="range" id="rotZ" min="-180" max="180" step="1" value="0">
        </div>
        
        <button id="generateBtn">GENERAR CÓDIGO QR</button>
    </div>

    <div id="container3d"></div>

    <div id="presentation">
        <div id="closeBtn" onclick="document.getElementById('presentation').style.display='none'">CERRAR</div>
        <div style="text-align:center"><h2>1. ESCANEA EL QR</h2><div id="qrcode"></div></div>
        <div style="text-align:center"><h2>2. APUNTA AL MARCADOR</h2><img src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" class="hiro-img"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, robot, marker;
        const CLOUD_NAME = "dudse9ysg";
        const UPLOAD_PRESET = "Clase_3d";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 280, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('container3d').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(1, 4, 3);
            scene.add(sun);
            scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x222222));

            new THREE.TextureLoader().load('https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg', (txt) => {
                const markerMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ map: txt }));
                markerMesh.rotation.x = -Math.PI / 2;
                scene.add(markerMesh);
            });

            const loader = new GLTFLoader();
            const controls = new OrbitControls(camera, renderer.domElement);

            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    if(robot) scene.remove(robot);
                    loader.load(URL.createObjectURL(file), (g) => { robot = g.scene; scene.add(robot); });
                }
            };

            // Lógica de Sliders
            function actualizarModelo() {
                if(!robot) return;
                const s = document.getElementById('scaleInput').value;
                document.getElementById('scale-val').innerText = s;
                robot.scale.set(s, s, s);
                
                const rx = THREE.MathUtils.degToRad(document.getElementById('rotX').value);
                const ry = THREE.MathUtils.radToDeg(document.getElementById('rotY').value); // Corregido el nombre a grados para URL
                const rz = THREE.MathUtils.degToRad(document.getElementById('rotZ').value);
                
                robot.rotation.set(rx, THREE.MathUtils.degToRad(document.getElementById('rotY').value), rz);
            }

            document.querySelectorAll('input[type="range"]').forEach(input => {
                input.oninput = actualizarModelo;
            });

            document.getElementById('generateBtn').onclick = async () => {
                const file = document.getElementById('fileInput').files[0];
                if(!file) return alert("Sube un archivo primero");
                document.getElementById('generateBtn').innerText = "SUBIENDO...";
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if(data.secure_url) {
                        const s = document.getElementById('scaleInput').value;
                        const rx = document.getElementById('rotX').value;
                        const ry = document.getElementById('rotY').value;
                        const rz = document.getElementById('rotZ').value;

                        let baseUrl = window.location.href.split('index.html')[0];
                        // Enviamos escala y las 3 rotaciones al view.html
                        let finalUrl = `${baseUrl}view.html?model=${encodeURIComponent(data.secure_url)}&s=${s}&rx=${rx}&ry=${ry}&rz=${rz}`;
                        
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 300, height: 300 });
                        document.getElementById('presentation').style.display = 'flex';
                    }
                } catch (err) { alert("Error al subir"); }
                document.getElementById('generateBtn').innerText = "GENERAR CÓDIGO QR";
            };
            animate();
        }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
