<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        #arjs-video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: fixed !important; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body style="margin: 0; background: transparent;">
    <!-- Activamos renderer de alta calidad -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;" vr-mode-ui="enabled: false" renderer="colorManagement: true; physicallyCorrectLights: true; exposure: 1.5; antialias: true;">
        
        <a-assets><a-asset-item id="modelo" src=""></a-asset-item></a-assets>
        
        <!-- TRIPLE ILUMINACIÓN PARA DETALLES MÁXIMOS -->
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 2; position: 1 5 3;"></a-entity>
        <a-entity light="type: directional; intensity: 1; position: -2 3 -1;"></a-entity>
        <a-entity light="type: hemisphere; color: #fff; groundColor: #000; intensity: 1;"></a-entity>
        
        <a-marker preset="hiro" id="marker" emitevents="true">
            <a-entity id="entidad" gltf-model="#modelo"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
    <script>
        const p = new URLSearchParams(window.location.search);
        const modelUrl = p.get('model');
        const s = parseFloat(p.get('s') || "1") * 0.45; 
        
        if(modelUrl) {
            const el = document.getElementById('entidad');
            el.setAttribute('gltf-model', decodeURIComponent(modelUrl));
            el.setAttribute('scale', `${s} ${s} ${s}`);
            el.setAttribute('position', `${p.get('px')} ${p.get('py')} ${p.get('pz')}`);
            el.setAttribute('rotation', `${p.get('rx')} ${p.get('ry')} ${p.get('rz')}`);
        }
        
        document.getElementById('marker').addEventListener('markerLost', () => { 
            document.getElementById('entidad').setAttribute('visible', 'true'); 
        });

        setInterval(() => {
            const video = document.querySelector('#arjs-video');
            if (video) { video.style.width = window.innerWidth + 'px'; video.style.height = window.innerHeight + 'px'; }
        }, 500);
    </script>
</body>
</html>
